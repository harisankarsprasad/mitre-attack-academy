  "T1110":{detail:"Guessing credentials at scale. Password spraying (one common password against many users) dodges lockouts; credential stuffing replays breached username/password pairs. Run low-and-slow to stay under thresholds.",detect:"Auth logs (bursts of 4625 then one 4624), spray patterns across many accounts from one IP/ASN, and smart-lockout plus MFA."},
  "T1555":{detail:"Looting saved secrets: browser password and cookie stores, password managers, cloud key vaults, and OS keychains/DPAPI. Browser cookie theft also enables session hijacking, and infostealers (RedLine, Lumma) automate it.",detect:"EDR on access to browser 'Login Data'/'Cookies' SQLite files, DPAPI masterkey access, and password-vault audit logs."},
  "T1539":{detail:"Stealing an authenticated session token or cookie to ride a logged-in session, bypassing MFA entirely without ever knowing the password. AiTM phishing kits (Evilginx) and infostealers are the usual sources.",detect:"Impossible-travel and anomalous-session analytics, token-binding/continuous-access-evaluation (CAE), and unusual user-agent or IP on an existing session."},
  "T1087":{detail:"Enumerating users and groups to find privileged targets: net user/group, AD/LDAP queries, and BloodHound/SharpHound to map attack paths to Domain Admin. The cloud variant lists IAM principals.",detect:"Bursts of net.exe and LDAP queries from one host (Sysmon 1, Event 4688), SACLs on sensitive AD objects, and BloodHound collector behaviour."},
  "T1018":{detail:"Finding other hosts: ping sweeps, AD computer queries, and tools like SoftPerfect Network Scanner, to plan lateral movement. Frequently a burst right before ransomware spread.",detect:"Abnormal internal scanning, ARP/ICMP sweeps from a single host, and east-west NetFlow anomalies."},
  "T1057":{detail:"Listing running processes (tasklist, ps, Get-Process), usually to spot EDR/AV products and decide how to evade or kill them. Quick and quiet.",detect:"EDR on process enumeration immediately followed by tampering attempts; correlate with Impair Defenses (T1562)."},
  "T1482":{detail:"Mapping trust between domains and forests (nltest, BloodHound) to find paths into higher-value or connected environments, which is key for Kerberos cross-trust abuse.",detect:"nltest/dsquery trust enumeration (Sysmon 1), LDAP queries for trustedDomain objects, and BloodHound collection."},
  "T1021":{detail:"Using legitimate remote-access protocols to move: RDP, SMB/admin shares, SSH, WinRM, VNC. Because it is valid admin tooling driven by valid credentials, it blends into normal IT activity.",detect:"Type-3/type-10 logons (Event 4624) to new host pairs, RDP session events (4778/4779), and 'workstation suddenly RDPs to servers' anomalies; segment east-west."},
  "T1550":{detail:"Authenticating with stolen hashes or Kerberos tickets instead of passwords: Pass-the-Hash, Pass-the-Ticket, and abusing app access tokens or cookies. Defeats password rotation because the secret is never typed.",detect:"Anomalous NTLM (Event 4776) and Kerberos TGT/TGS patterns (4768/4769), encryption downgrades, and golden/silver-ticket lifetime anomalies."},
  "T1570":{detail:"Copying tools or malware between internal hosts: over SMB admin shares (C$, ADMIN$), PsExec, or BITS, to operate on each new machine.",detect:"SMB writes of executables to admin shares, BITS job creation (Event 59/60), and new executables appearing in the Windows system folder across multiple hosts."},
  "T1005":{detail:"Harvesting files directly from a compromised host: documents, configs, source code and local databases. Usually scripted to grep the disk for keywords like password, secret or confidential.",detect:"EDR on bulk or recursive file reads, access to sensitive paths, and staging-tool execution; correlate with later archive creation."},
  "T1039":{detail:"Pulling files from internal SMB/NFS file shares, which often hold large volumes of sensitive data behind weak ACLs. A single over-shared drive can be the whole jackpot.",detect:"Spikes in share access (Event 5145), one account touching many shares quickly, and honeyfiles seeded on sensitive shares."},
  "T1074":{detail:"Collecting the loot into one location, usually compressed and encrypted (7-Zip, WinRAR, rar.exe), to make exfil efficient and quiet. An archive in a temp or recycle path is a classic tell.",detect:"Creation of large .zip/.rar/.7z files in temp or odd locations (Sysmon 11), and archiver processes invoked with a password switch."},
  "T1113":{detail:"Taking screenshots of the victim's screen to grab data that is hard to export — dashboards, internal apps, even MFA prompts. Common in espionage implants and infostealers.",detect:"EDR flags on screen-capture API use (BitBlt/GDI), and unusual image files written by non-graphics processes."},
  "T1071":{detail:"Hiding C2 in everyday protocols (HTTP/S, DNS, email) so it blends with normal traffic. DNS tunneling exfils inside TXT/A queries; web C2 mimics software-update traffic.",detect:"Beaconing detection (regular intervals plus jitter), rare-destination TLS/JA3 fingerprints, and DNS volume/entropy anomalies."},
  "T1573":{detail:"Encrypting the C2 channel (symmetric or TLS/asymmetric) so inspection cannot read commands or stolen data, forcing defenders onto metadata and endpoint telemetry.",detect:"TLS fingerprinting (JA3/JA3S), self-signed or odd-certificate detection, beacon timing, and endpoint-side visibility via EDR."},
  "T1102":{detail:"Using legitimate platforms (cloud storage, GitHub, Slack/Telegram, paste sites) as the C2 relay so traffic looks normal and the domain reputation is clean ('living off trusted sites').",detect:"Anomalous SaaS API use from servers, CASB/proxy logs, and outbound to consumer cloud from non-user hosts."},
  "T1090":{detail:"Routing C2 through intermediaries (compromised hosts, SOHO routers, multi-hop proxies, Tor) to hide the real server and evade IP blocks. Volt Typhoon's edge-router relays are the modern example.",detect:"Outbound to known proxy/Tor nodes, traffic to compromised edge devices, and multi-hop latency/route anomalies."},
  "T1041":{detail:"Sending stolen data back over the same covert channel used for commands, so there is no new infrastructure to detect. Throttled and chunked to avoid spikes.",detect:"Outbound-volume anomalies on existing C2 sessions, inverted upload/download ratios, and DLP on the egress path."},
  "T1567":{detail:"Uploading data to legitimate cloud/web services (Mega, Dropbox, S3, GitHub) so it blends into normal cloud usage. Rclone to cloud storage is a ransomware staple.",detect:"rclone/megacmd process and network telemetry, large uploads to unsanctioned cloud (CASB), and new cloud destinations from servers."},
  "T1048":{detail:"Using a different protocol than C2 (DNS, ICMP, FTP, SMTP) to slip data past controls watching the main channel. Unencrypted variants are noisy but effective.",detect:"DNS exfil (high TXT volume/entropy), unexpected FTP/SMTP from servers, and egress-protocol allow-listing."},
  "T1030":{detail:"Breaking exfil into small chunks under detection thresholds so no single transfer looks abnormal, paired with throttling and off-hours timing.",detect:"Aggregate-over-time egress analytics rather than per-transfer rules, and cumulative-volume DLP thresholds per host/user."},
  "T1486":{detail:"Encrypting systems and data to extort, the core of ransomware. Modern variants are multithreaded, target ESXi and Linux, and use intermittent encryption for speed.",detect:"Mass file-modify/rename bursts, canary files, shadow-copy deletion, and EDR ransomware-behaviour rules; real recovery hinges on immutable backups."},
  "T1490":{detail:"Destroying backups, shadow copies and recovery points so the victim cannot restore, forcing payment. Done right before encryption.",detect:"vssadmin/wmic shadowcopy delete, bcdedit recovery edits, wbadmin delete (Event 4688 + Sysmon 1) — alert hard on these."},
  "T1485":{detail:"Wiping or corrupting data with no recovery intent: sabotage, not extortion. Wipers disguised as ransomware (NotPetya) live here, and some target the MBR/boot record.",detect:"Mass deletes/overwrites, raw disk writes, MBR modification, and unusual use of sdelete or cipher /w."},
  "T1565":{detail:"Silently altering data to undermine integrity: changing financial records, transactions or sensor readings (APT38's SWIFT fraud). Hard to detect, high consequence.",detect:"File-integrity monitoring on critical records, database audit trails, and reconciliation/anomaly checks on key datasets."}
};

/* ---------- Real-world incident, reframed as Why / How / Succeeded? + a freshly-browsed 2025-26 update ---------- */
const INCIDENT_EXTRA = {
  recon:{why:"APT29 (Russia's SVR) runs espionage, so cheap, quiet target study lets them pick exactly who to phish and which trust relationship to abuse.",how:"They build detailed dossiers from public and breached sources — diplomatic contact lists, org charts, software in use — before a single email is sent.",outcome:"Succeeded. This patient recon is what made the SolarWinds-era spearphishing land on the right people with the right pretext.",latest:"Latest (2025): APT29's 'wine-tasting' phishing on European diplomats (GRAPELOADER) and an Aug-2025 watering-hole that funnelled ~10% of visitors into Microsoft device-code auth abuse — recon-driven targeting is still their signature. (Check Point, Volexity)"},
  resource:{why:"Lazarus (DPRK) needs deniable infrastructure and trusted-looking payloads to run both espionage and revenue-generating theft.",how:"They build elaborate recruiter personas, register supporting infrastructure, and develop custom implants and signed loaders before contacting a victim ('Operation Dream Job').",outcome:"Succeeded repeatedly — the upfront investment in personas and tooling is exactly why their lures convert.",latest:"Latest (2025): the $1.5B Bybit heist (Feb 2025, FBI-attributed to DPRK 'TraderTraitor'/Lazarus) started from a compromised Safe{Wallet} developer machine and a malicious-but-legitimate-looking transaction — resource development at industrial scale. (FBI IC3)"},
  initial:{why:"One supply-chain compromise scales to thousands of downstream victims — unmatched reach for an espionage actor.",how:"APT29 inserted the SUNBURST backdoor into SolarWinds Orion updates; about 18,000 organisations installed the trojanised update themselves.",outcome:"Succeeded massively — initial access into thousands of networks from a single build-system compromise (T1195.002).",latest:"Latest (2025-26): the dominant initial-access story is edge-device zero-days — Ivanti Connect Secure CVE-2025-22457 (UNC5221), repeated Citrix 'Bleed'-style bugs, and Cl0p's Oracle EBS CVE-2025-61882. Perimeter appliances are now the front door. (Mandiant, Oligo)"},
  execution:{why:"FIN7 monetises access (card theft, ransomware), so they favour stealthy execution that does not trip AV and keeps them resident.",how:"Malicious documents launch PowerShell and JavaScript that pull payloads into memory rather than dropping obvious binaries.",outcome:"Succeeded — behaviour-based execution kept them operating across many victims for years before takedowns.",latest:"Latest (2025): living-off-the-land is now standard for top-tier actors — Volt Typhoon runs almost entirely on built-in tools (wmic, netsh, PowerShell) to avoid malware signatures while pre-positioning in US critical infrastructure. (CISA, Dragos)"},
  persistence:{why:"A web shell on the mail server lets the actor return at will, even after the original exploit is patched.",how:"HAFNIUM exploited Exchange zero-days (ProxyLogon) and dropped web shells (T1505.003) onto internet-facing servers.",outcome:"Succeeded — the web shells outlived the patch, giving durable re-entry until defenders hunted them down.",latest:"Latest (2025): HAFNIUM, now tracked as Silk Typhoon, shifted toward IT supply-chain and cloud-app persistence; and Scattered Spider plants rogue federation/IdP trust and new cloud accounts that survive password resets. (Microsoft)"},
  privesc:{why:"Most footholds are low-privilege, so escalation to admin or Domain Admin is the bridge to network-wide, destructive impact.",how:"Sandworm chains exploits and credential abuse to reach domain dominance, then uses that power for sabotage.",outcome:"Succeeded — escalation to Domain Admin is what enabled NotPetya's network-wide detonation.",latest:"Latest (2025-26): escalation increasingly rides on identity, not kernel bugs — over-permissioned cloud IAM roles, OAuth consent grants, and AD misconfigs (mapped with BloodHound) are the common path, which patch-only programs keep missing."},
  evasion:{why:"If the EDR or AV is blinded, the rest of the intrusion and the final encryption run unopposed.",how:"Affiliates disable or uninstall security tools (T1562.001), frequently via a vulnerable signed driver (BYOVD), before acting.",outcome:"Succeeded often enough that 'kill the EDR first' is now a standard pre-encryption step.",latest:"Latest (2025): LockBit 5.0 (returned Sept 2025 after the 2024 Operation Cronos takedown) ships stronger evasion and BYOVD-style EDR-killing across its Windows, Linux and ESXi variants. (Check Point)"},
  credaccess:{why:"Valid credentials and live sessions let the attacker move as a trusted user, defeating most preventive controls.",how:"Scattered Spider combines help-desk social engineering, SIM-swapping and session-token theft to beat MFA, then dumps more credentials to spread.",outcome:"Succeeded — it proved MFA is necessary but not sufficient against token theft and help-desk abuse.",latest:"Latest (2025): Scattered Spider's 2025 spree (M&S, Co-op, Aflac, airlines) ran almost entirely on help-desk vishing and MFA-reset abuse — confidently answering identity-verification questions to get credentials reset. (CrowdStrike, FBI)"},
  discovery:{why:"Before encrypting, operators want maximum blast radius and to find and destroy backups first.",how:"Heavy enumeration of AD, hosts, shares and backup servers, often via built-in commands and tools like AdFind, SoftPerfect and BloodHound.",outcome:"Succeeded — thorough discovery is what lets a single intrusion encrypt a whole estate and block recovery.",latest:"Latest (2025): Akira, Qilin and LockBit 5.0 affiliates still lean on BloodHound/AdFind bursts pre-encryption; a sudden spike of AD and backup-server enumeration from one host remains the highest-value early ransomware tell."},
  lateral:{why:"The first box is rarely the target, so the actor pivots toward the data or systems they actually want.",how:"NotPetya paired Mimikatz-style credential theft with Pass-the-Hash and PsExec/WMI to spread across whole networks in minutes.",outcome:"Succeeded catastrophically — credential-driven lateral movement caused around $10B in global damage.",latest:"Latest (2025): Salt Typhoon moved laterally across US and global telecoms (600+ orgs, 80+ countries) using stolen credentials and trusted protocols — quiet, valid-credential movement that blended into normal admin traffic. (Trend Micro, GCA)"},
  collection:{why:"Stealing data first adds leverage: pay to decrypt and pay to prevent the leak (double extortion).",how:"Operators pull from databases and file shares and stage it in one compressed, encrypted archive before exfil.",outcome:"Succeeded — Cl0p's MOVEit campaign (2023) collected data from hundreds of organisations via one file-transfer zero-day.",latest:"Latest (2025): Cl0p's Oracle E-Business Suite campaign (CVE-2025-61882) again collected bulk data from many orgs (Dartmouth, Cox, U-Penn reported), then sent mass extortion emails — data theft, no encryption. (Oligo, Rescana)"},
  c2:{why:"Long-term access to critical infrastructure demands C2 that blends in and survives scrutiny.",how:"Volt Typhoon routes through compromised SOHO routers and edge devices and lives off the land to avoid stand-out malware traffic.",outcome:"Succeeded — low-noise C2 kept them resident in critical-infrastructure networks for years.",latest:"Latest (2025-26): Dragos confirms Volt Typhoon still active in US utilities through 2025; proxying C2 through compromised edge devices is now the stealth playbook and defeats simple IP/domain blocklists. (Dragos, CISA)"},
  exfil:{why:"For theft and extortion actors, getting the data out is the whole objective — encryption is optional.",how:"Cl0p exploited a MOVEit Transfer zero-day to steal data from hundreds of organisations, then extorted them with leak threats.",outcome:"Succeeded — exfiltration alone was the entire operation; no ransomware was needed.",latest:"Latest (2025): Cl0p repeated the model on Oracle EBS (Aug-Oct 2025) — quiet bulk exfil through an app zero-day, then extortion. It reinforces that DLP and egress monitoring matter as much as anti-ransomware. (Oligo)"},
  impact:{why:"Impact is the destructive or coercive payoff: extortion, sabotage, or both.",how:"Sandworm's NotPetya looked like ransomware but was a wiper (Data Destruction + Inhibit Recovery) with no real recovery path.",outcome:"Succeeded as sabotage — about $10B in damage, the costliest cyberattack on record, and recovery was impossible by design.",latest:"Latest (2025): ransomware fragmented but intensified — LockBit 5.0's return plus a Qilin/DragonForce alliance, and a shift toward data-theft-only extortion (Cl0p). Tested, offline or immutable backups remain the deciding control. (The Hacker News)"}

/* ATT&CK Academy app logic */
(function(){
  const root = document.getElementById("root");

  /* ---- persistent state (saved to localStorage so it survives refresh / tab close) ---- */
  const LS_KEY = "attack-academy-state-v2";
  const state = {
    current: "home",     // not persisted between sessions (always boot to home)
    done: {},            // tacticId -> true when quiz passed
    quizCorrect: {},     // tacticId -> count correct
    examDone: false,     // final exam completed
    examScore: null,     // last exam score
    interview: {},        // interview item index -> true when answered/revealed
    interviewDone: false, // all interview items completed
    streak: 0,
    lastStudyDay: null,   // toDateString() of the last day a question was answered
    xp: 0,                // experience points
    soundOn: false,       // subtle UI sound, off by default
    navCollapsed: false,  // sidebar minimized
    navTouched: false,    // user manually toggled the sidebar
  };

  function loadState(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      if(!raw) return;
      const saved = JSON.parse(raw);
      // restore persisted fields only; keep current="home" on boot
      ["done","quizCorrect","examDone","examScore","interview","interviewDone","streak","lastStudyDay","xp","soundOn","navCollapsed","navTouched"]
        .forEach(k=>{ if(saved[k]!==undefined) state[k]=saved[k]; });
      // a streak only stays alive if the last active day was today or yesterday
      if(state.lastStudyDay){
        const diff = dayDiff(state.lastStudyDay, new Date().toDateString());
        if(diff > 1) state.streak = 0; // missed a day -> streak broken
      }
    }catch(e){ /* storage unavailable or corrupt -> start fresh, no crash */ }
  }
  function saveState(){
    try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
  }
  function dayDiff(a,b){ return Math.round((new Date(b) - new Date(a))/86400000); }

  const esc = s => s; // content is trusted/local
  let searchQ = ""; // current sidebar search filter

  /* ---------- build top bar + shell ---------- */
  function shell(){
    root.innerHTML = `
      <div class="topbar">
        <button class="navtoggle" id="navToggle" title="Show / hide tactics menu" aria-label="Toggle menu"><span></span><span></span><span></span></button>
        <div class="brand" id="brandHome" title="ATT&amp;CK Academy — home">
          <svg class="brandmark" width="26" height="26" viewBox="0 0 32 32" aria-hidden="true">
            <path d="M16 5 L28 27 L4 27 Z" fill="none" stroke="var(--plum)" stroke-width="2" stroke-linejoin="round"/>
            <path d="M16 5 L16 27 M16 5 L21 27 M16 5 L11 27" stroke="var(--plum)" stroke-width="1" opacity=".45"/>
          </svg>
          <span class="bword">ATT&amp;CK<b>Academy</b></span>
          <span class="btag">think like the attacker</span>
        </div>
        <div class="spacer"></div>
        <div class="rankpill" id="hudRankPill" title="Your operator rank · XP progress to next level">
          <span id="hudEmblem" style="display:flex;align-items:center"></span>
          <span class="lvl" id="hudLvl">LV1</span>
          <span class="rname" id="hudRank">Recruit</span>
          <span class="xpbar"><i id="hudXpFill"></i></span>
        </div>
        <button class="sndbtn" id="sndBtn" title="Toggle sound">🔇</button>
        <div class="progress-mini">Tactics mastered: <b id="pm">0</b>/14</div>
        <div class="streak" id="streakBox"><span class="flame">🔥</span><span>Streak <b id="streakN">0</b></span></div>
      </div>
      <div class="mobnav"><select id="mobsel"></select></div>
      <div class="wrap">
        <aside class="side" id="side"></aside>
        <main class="main" id="main"></main>
      </div>`;
    buildNav();
    document.getElementById("mobsel").addEventListener("change",e=>go(e.target.value));
    document.getElementById("hudRankPill").addEventListener("click",()=>go("home"));
    document.getElementById("brandHome").addEventListener("click",()=>go("home"));
    document.getElementById("navToggle").addEventListener("click",()=>{
      state.navTouched=true; state.navCollapsed=!document.body.classList.contains("nav-collapsed"); saveState(); applyNav();
    });
    const sb=document.getElementById("sndBtn");
    sb.textContent = state.soundOn?"🔊":"🔇";
    sb.addEventListener("click",toggleSound);
    updateHud();
  }

  function buildNav(){
    const side = document.getElementById("side");
    const mob = document.getElementById("mobsel");
    let html = `<div class="navsearch-wrap"><input id="navsearch" type="search" placeholder="🔎 Search tactics, techniques, T-IDs" autocomplete="off"></div>
      <h4>Start here</h4>
      <div class="nav-item ${state.current==='home'?'active':''}" data-go="home"><span class="n">★</span> Home &amp; how to use</div>
      <div class="nav-item ${state.current==='story'?'active':''}" data-go="story"><span class="n">▶</span> The STORMVALE story</div>
      <h4>14 Enterprise tactics</h4>`;
    let mobh = `<option value="home">★ Home &amp; how to use</option><option value="story">▶ The STORMVALE story</option>`;
    TACTICS.forEach((t,i)=>{
      const done = state.done[t.id];
      const idxBits = t.techniques.map(tc=>tc.tid+" "+tc.name+" "+(tc.subs||[]).map(s=>s.id).join(" ")).join(" ");
      const sidx = (t.name+" "+t.n+" "+idxBits).toLowerCase();
      html += `<div class="nav-item ${state.current===t.id?'active':''} ${done?'done':''}" data-go="${t.id}" data-search="${sidx.replace(/"/g,'')}">
        <span class="n">${String(i+1).padStart(2,'0')}</span> ${t.name}<span class="chk">✓</span></div>`;
      mobh += `<option value="${t.id}" ${state.current===t.id?'selected':''}>${i+1}. ${t.name}${done?' ✓':''}</option>`;
    });
    html += `<h4>Wrap up</h4>
      <div class="nav-item ${state.current==='exam'?'active':''} ${state.examDone?'done':''}" data-go="exam"><span class="n">∑</span> Final mixed exam<span class="chk">✓</span></div>
      <div class="nav-item ${state.current==='interview'?'active':''} ${state.interviewDone?'done':''}" data-go="interview"><span class="n">🎙</span> Interview Prep<span class="chk">✓</span></div>`;
    mobh += `<option value="exam">∑ Final mixed exam${state.examDone?' ✓':''}</option>`;
    mobh += `<option value="interview">🎙 Interview Prep${state.interviewDone?' ✓':''}</option>`;
    side.innerHTML = html;
    mob.innerHTML = mobh;
    side.querySelectorAll(".nav-item").forEach(el=>el.addEventListener("click",()=>go(el.dataset.go)));
    const ns = document.getElementById("navsearch");
    if(ns){ ns.value = searchQ; ns.addEventListener("input", e=>{ searchQ = e.target.value; filterNav(); }); }
    filterNav();
    document.getElementById("pm").textContent = Object.keys(state.done).filter(k=>state.done[k]).length;
  }

  function go(id){
    state.current=id; render(); window.scrollTo({top:0,behavior:"smooth"});
    const m=document.getElementById("main");
    if(m){ m.classList.remove("view-enter"); void m.offsetWidth; m.classList.add("view-enter"); }
    playSound("click");
  }

  /* ---------- streak ----------
     Real, input-driven, persisted. Increments the first time you ANSWER a question
     on a new calendar day; stays the same for further answers that day; resets to 1
     if you'd skipped a day (a broken streak is zeroed on load). */
  function registerActivity(){
    const today = new Date().toDateString();
    let changed = false;
    if(state.lastStudyDay !== today){
      if(state.lastStudyDay && dayDiff(state.lastStudyDay, today) === 1){
        state.streak = state.streak + 1;   // consecutive day
      } else {
        state.streak = 1;                  // first ever, or returned after a gap
      }
      state.lastStudyDay = today;
      changed = true;
    }
    saveState();
    updateStreakUI(changed);
  }
  function updateStreakUI(pulse){
    const box=document.getElementById("streakBox");
    if(!box) return;
    document.getElementById("streakN").textContent=state.streak;
    if(state.streak>0) box.classList.add("lit"); else box.classList.remove("lit");
    if(pulse){ box.classList.remove("pulse"); void box.offsetWidth; box.classList.add("pulse"); }
  }

  /* ===================== GAMIFICATION: XP, RANKS, SOUND, FX ===================== */
  const RANKS = [
    {min:0,name:"Recruit",c:"#ff7a18",rgb:"255,122,24"},
    {min:120,name:"SOC Analyst I",c:"#6f7bff",rgb:"111,123,255"},
    {min:300,name:"SOC Analyst II",c:"#2bb1ff",rgb:"43,177,255"},
    {min:540,name:"Threat Hunter",c:"#2fd0a8",rgb:"47,208,168"},
    {min:850,name:"Incident Responder",c:"#ffb829",rgb:"255,184,41"},
    {min:1250,name:"Threat Intel Lead",c:"#ff6fae",rgb:"255,111,174"},
    {min:1800,name:"Adversary Emulator",c:"#ffd166",rgb:"255,209,102"}
  ];
  let currentRankRGB = "255,122,24";   // read by the particle background
  let globeRecolor = null;             // set by initGlobe; lets rank changes re-tint the WebGL globe
  let ivOrder = null;                  // shuffled display order for interview (original indices preserved)
  function rankIndex(xp){ let i=0; for(let k=0;k<RANKS.length;k++){ if(xp>=RANKS[k].min) i=k; } return i; }
  function setRankTheme(idx){
    const r = RANKS[idx]||RANKS[0];
    document.documentElement.style.setProperty("--rank", r.c);
    document.documentElement.style.setProperty("--rank-rgb", r.rgb);
    currentRankRGB = r.rgb;
    if(globeRecolor){ try{ globeRecolor(r.rgb); }catch(e){} }
  }
  /* parametric SVG rank emblem: hex badge, level pips, crown for top rank */
  function emblem(level,size){
    size = size||40; const cx=24,cy=24;
    const hex="M24 3 L41 13 L41 35 L24 45 L7 35 L7 13 Z";
    // chevrons stacked = level (1-7)
    let chev=""; for(let i=0;i<level;i++){ const yy=30-i*3.2; chev+=`<path d="M16 ${yy} L24 ${yy-4} L32 ${yy}" fill="none" stroke="var(--rank)" stroke-width="2" stroke-linecap="round" opacity="${0.55+i*0.06}"/>`; }
    const crown = level>=7 ? `<path d="M16 11 L19 15 L24 10 L29 15 L32 11 L31 18 L17 18 Z" fill="var(--rank)" opacity=".95"/>` : "";
    return `<svg class="emblem-svg" width="${size}" height="${size}" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <path d="${hex}" fill="rgba(var(--rank-rgb),.10)" stroke="var(--rank)" stroke-width="2"/>
      <path d="${hex}" fill="none" stroke="rgba(var(--rank-rgb),.35)" stroke-width="5" transform="scale(.86) translate(3.9 3.9)"/>
      ${chev}${crown}
      <text x="24" y="${level>=7?40:42}" text-anchor="middle" font-family="Orbitron,IBM Plex Sans,sans-serif" font-weight="900" font-size="9" fill="#fff" opacity=".9">L${level}</text>
    </svg>`;
  }
  function rankInfo(xp){
    const i=rankIndex(xp), cur=RANKS[i].min, next=RANKS[i+1]?RANKS[i+1].min:null;
    const pct = next!==null ? Math.min(100,Math.round((xp-cur)/(next-cur)*100)) : 100;
    return { i, level:i+1, name:RANKS[i].name, cur, next, pct, toNext: next!==null?next-xp:0 };
  }
  function awardXP(n){
    const before = rankIndex(state.xp);

  /* cinematic level-up: dim, emblem zoom, then a slow recolor wave that commits the new rank theme */
  function levelUpSequence(idx){
    const lvl=idx+1, r=RANKS[idx];

    const cleanup=()=>{ document.removeEventListener("keydown",skip); };
    function finish(){ if(done) return; done=true; commit(); el.classList.remove("active"); setTimeout(()=>el.remove(),500); cleanup(); }
    function skip(){ finish(); }
    const reduce = window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches;
    if(reduce){ commit(); setTimeout(()=>el.remove(),60); return; }
    void el.offsetWidth;
    requestAnimationFrame(()=>el.classList.add("active","wave-on"));
    setTimeout(commit, 760);                       // recolor the UI mid-wave
    setTimeout(()=>el.classList.add("wave-off"), 1500);
    setTimeout(()=>el.classList.remove("active"), 2700);
    setTimeout(()=>{ if(!done){ el.remove(); cleanup(); } }, 3300);
    el.style.pointerEvents="auto";                 // allow click/key to skip

  /* ---- subtle sound (WebAudio, off by default, gated by state.soundOn) ---- */
  let _ac=null;
  function ac(){ try{ _ac=_ac||new (window.AudioContext||window.webkitAudioContext)(); if(_ac.state==="suspended")_ac.resume(); return _ac; }catch(e){ return null; } }
  function tone(freq,dur,type,vol,delay){
    if(!state.soundOn) return; const a=ac(); if(!a) return;
    const t=a.currentTime+(delay||0); const o=a.createOscillator(), g=a.createGain();
    o.type=type||"sine"; o.frequency.value=freq; o.connect(g); g.connect(a.destination);
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(vol||0.05,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.02);
  }
  function playSound(kind){
    if(!state.soundOn) return;
    if(kind==="click") tone(420,0.06,"triangle",0.035);

    else if(kind==="wrong") tone(150,0.22,"sawtooth",0.045);
    else if(kind==="levelup"){ [523,659,784,1047].forEach((f,i)=>tone(f,0.2,"triangle",0.06,i*0.09)); }
  }

  /* ---------- TACTIC MODULE ---------- */
  function renderTactic(t, idx){
    const techHtml = t.techniques.map(tech=>{
      const subs = tech.subs && tech.subs.length
        ? tech.subs.map(s=>`<div class="sub"><b>${s.id}</b> ${s.name}${s.note?` — ${s.note}`:''}</div>`).join("")
        : "";
      const apts = `<div class="apt-row">${tech.apts.map(a=>groupChip(a)).join("")}</div>`;
      const ex = TECH_EXTRA[tech.tid];
      const detailHtml = ex&&ex.detail ? `<p class="t-detail">${ex.detail}</p>` : "";
      const detectHtml = ex&&ex.detect ? `<p class="detect"><span class="dl">🛡 DETECT</span>${ex.detect}</p>` : "";
      return `<div class="tech">
        <div class="tech-head">
          <span class="tid">${tech.tid}</span>
          <span class="t-name">${tech.name}</span>
          <span class="caret">›</span>
        </div>

          ${tech.body}

          ${subs?`<p style="margin:14px 0 6px;color:var(--ink)"><strong>Sub-techniques</strong></p>${subs}`:""}
          ${detectHtml}
          <p style="margin:14px 0 2px;color:var(--ink)"><strong>Groups seen using this</strong> <span style="color:var(--ink-faint);font-size:12px">— tap a chip for its MITRE profile</span></p>
          ${apts}
        </div>
      </div>`;
    }).join("");

    const flowSvg = FLOWS[t.flow] ? FLOWS[t.flow]() : "";
    const ie = INCIDENT_EXTRA[t.id] || {};

  /* ---------- hero constellation: micro-shapes clustering into an organic form ---------- */
  let heroRAF=0;
  function initHeroFx(){
    const c=document.getElementById("herofx"); if(!c) return;
    const ctx=c.getContext("2d"); if(heroRAF) cancelAnimationFrame(heroRAF);
    const dpr=Math.min(2,window.devicePixelRatio||1);
    // STORMVALE emblem: lightning bolt inside a hex crest
    const cols=["#ff7a18","#ff7a18","#ffb829","#ffd166","#ffffff"];
    const frameCols=["#ff7a18","#ffb829"];
    let cw=0,ch=0,shapes=[];
    const bolt=[[0.56,0.03],[0.31,0.50],[0.47,0.50],[0.29,0.97],[0.72,0.42],[0.54,0.42],[0.70,0.03]];
    function inPoly(x,y,p){ let inside=false; for(let i=0,j=p.length-1;i<p.length;j=i++){ const xi=p[i][0],yi=p[i][1],xj=p[j][0],yj=p[j][1]; if(((yi>y)!==(yj>y)) && (x<(xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside; } return inside; }
    function build(){
      const r=c.getBoundingClientRect(); cw=r.width||520; ch=r.height||320;
      c.width=cw*dpr; c.height=ch*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
      const cx=cw*0.5, cy=ch*0.5, R=Math.min(cw,ch)*0.46; shapes=[];
      // hex crest (outline)
      const hexN=130, seg=Math.PI/3;
      for(let i=0;i<hexN;i++){ const a=(i/hexN)*Math.PI*2, m=a%seg, hrad=R*0.98*Math.cos(seg/2)/Math.cos(m-seg/2);
        const x=cx+Math.cos(a-Math.PI/2)*hrad, y=cy+Math.sin(a-Math.PI/2)*hrad;
        shapes.push({bx:x,by:y,s:2+Math.random()*2.2,kind:3,col:frameCols[(Math.random()*frameCols.length)|0],ph:Math.random()*6.283,amp:0.5+Math.random()*0.9,sp:0.3+Math.random()*0.5});
      }
      // lightning bolt fill
      const bw=R*1.12, bx0=cx-bw/2, by0=cy-bw/2;
      const target=Math.min(420,Math.max(190,Math.floor(cw*ch/180))); let tries=0;
      while(shapes.length<hexN+target && tries<target*55){ tries++;
        const ux=Math.random(), uy=Math.random();
        if(!inPoly(ux,uy,bolt)) continue;
        shapes.push({bx:bx0+ux*bw,by:by0+uy*bw,s:2+Math.random()*3.2,kind:(Math.random()*4)|0,col:cols[(Math.random()*cols.length)|0],ph:Math.random()*6.283,amp:1+Math.random()*1.6,sp:0.4+Math.random()*0.8});
      }
    }
    function draw(t){
      ctx.clearRect(0,0,cw,ch);
      for(const sh of shapes){
        const x=sh.bx+Math.cos(sh.ph+t*0.0006*sh.sp)*sh.amp, y=sh.by+Math.sin(sh.ph+t*0.0006*sh.sp)*sh.amp;
        ctx.fillStyle=sh.col; ctx.globalAlpha=0.82; ctx.beginPath();
        if(sh.kind===0){ ctx.arc(x,y,sh.s/2,0,7); }
        else if(sh.kind===1){ ctx.moveTo(x,y-sh.s/1.5); ctx.lineTo(x+sh.s/1.5,y+sh.s/1.5); ctx.lineTo(x-sh.s/1.5,y+sh.s/1.5); ctx.closePath(); }
        else if(sh.kind===2){ ctx.rect(x-sh.s/2,y-sh.s/2,sh.s,sh.s); }
        else { ctx.moveTo(x,y-sh.s/1.4); ctx.lineTo(x+sh.s/1.4,y); ctx.lineTo(x,y+sh.s/1.4); ctx.lineTo(x-sh.s/1.4,y); ctx.closePath(); }
        ctx.fill();
      }
      ctx.globalAlpha=1;
    }
    build();
    function loop(t){ draw(t); heroRAF=requestAnimationFrame(loop); }
    heroRAF=requestAnimationFrame(loop);
  }

  /* ---------- WebGL globe / attack-map (Three.js); falls back to 2D field on error ---------- */
  function initGlobe(){
    const canvas=document.getElementById("bgfx"); if(!canvas || !window.THREE) throw new Error("no-webgl");

    // 3D pyramid (tetrahedron) sprite
    const tc=document.createElement("canvas"); tc.width=tc.height=64; const tx=tc.getContext("2d");
    tx.strokeStyle="#fff"; tx.lineWidth=4; tx.lineJoin="round";

    tx.beginPath(); tx.moveTo(A[0],A[1]); tx.lineTo(P[0],P[1]); tx.moveTo(B[0],B[1]); tx.lineTo(P[0],P[1]); tx.moveTo(C[0],C[1]); tx.lineTo(P[0],P[1]); tx.stroke();
    const tex=new T.CanvasTexture(tc);
    const rgbArr=s=>s.split(",").map(n=>parseInt(n,10)/255);
    let rankRGB=rgbArr(currentRankRGB);

    // continents as lat/lon blobs (deg): [lat,lon,radius]
    const CONTS=[[2,20,33],[50,12,17],[46,92,40],[55,-100,26],[40,-95,18],[-12,-60,26],[-26,134,15],[64,-44,12],[60,100,20]];
    function isLand(lat,lon){ for(const k of CONTS){ let dlon=lon-k[1]; if(dlon>180)dlon-=360; if(dlon<-180)dlon+=360; const d=Math.hypot(lat-k[0], dlon*Math.cos(lat*Math.PI/180)); if(d<k[2]) return true; } return false; }
    const PX=[],PC=[],RANKMASK=[]; const landPts=[];
    const Rg=6, M=17000;
    for(let i=0;i<M && PX.length/3<9200;i++){
      const t=(i+0.5)/M, inc=Math.acos(1-2*t), az=Math.PI*(1+Math.sqrt(5))*i;
      const x=Math.sin(inc)*Math.cos(az), y=Math.cos(inc), z=Math.sin(inc)*Math.sin(az);
      const lat=Math.asin(y)*180/Math.PI, lon=Math.atan2(z,x)*180/Math.PI;
      const land=isLand(lat,lon);
      if(!land && Math.random()>0.34) continue;             // oceans sparse -> continents read
      const jr=0.12;
      const px=x*Rg+(Math.random()-.5)*jr, py=y*Rg+(Math.random()-.5)*jr, pz=z*Rg+(Math.random()-.5)*jr;
      PX.push(px,py,pz);
      let c, rank=0;
      if(land){ const r=Math.random(); if(r<0.4){c=rankRGB;rank=1;} else if(r<0.62)c=amber; else if(r<0.85)c=lichen; else c=bone; if(landPts.length<400) landPts.push([px,py,pz]); }
      else c=ocean;
      PC.push(c[0],c[1],c[2]); RANKMASK.push(rank);
    }
    // outer drifting halo
    const halo=Math.floor(PX.length/3*0.12);
    for(let i=0;i<halo;i++){ const u=Math.random(),v=Math.random(),th=2*Math.PI*u,ph=Math.acos(2*v-1),R=6.6+Math.random()*5;
      PX.push(R*Math.sin(ph)*Math.cos(th),R*Math.cos(ph),R*Math.sin(ph)*Math.sin(th));
      const c=Math.random()<0.6?rankRGB:amber; PC.push(c[0],c[1],c[2]); RANKMASK.push(Math.random()<0.6?1:0);
    }
    const N=PX.length/3;
    const pos=new Float32Array(PX), basePos=new Float32Array(PX), col=new Float32Array(PC), isRank=Uint8Array.from(RANKMASK);
    const geo=new T.BufferGeometry();
    const posAttr=new T.BufferAttribute(pos,3); geo.setAttribute("position", posAttr);
    const colAttr=new T.BufferAttribute(col,3); geo.setAttribute("color", colAttr);
    const mat=new T.PointsMaterial({size:0.17,map:tex,vertexColors:true,transparent:true,depthWrite:false,sizeAttenuation:true,blending:T.AdditiveBlending,opacity:0.95});
    group.add(new T.Points(geo,mat));
    // attack-map arcs between land points
    const arcs=[]; const vec=a=>new T.Vector3(a[0],a[1],a[2]);
    for(let k=0;k<24 && landPts.length>2;k++){ const a=vec(landPts[(Math.random()*landPts.length)|0]),b=vec(landPts[(Math.random()*landPts.length)|0]);
      if(a.distanceTo(b)<3) continue; const mid=a.clone().add(b).multiplyScalar(0.5).setLength(8.4+Math.random()*1.6);
      const lg=new T.BufferGeometry().setFromPoints(new T.QuadraticBezierCurve3(a,mid,b).getPoints(36));
      const lm=new T.LineBasicMaterial({color:new T.Color(rankRGB[0],rankRGB[1],rankRGB[2]),transparent:true,opacity:0.28});
      group.add(new T.Line(lg,lm)); arcs.push(lm); }
    globeRecolor=function(s){ const c=rgbArr(s); rankRGB=c; for(let i=0;i<N;i++){ if(isRank[i]){ col[i*3]=c[0]; col[i*3+1]=c[1]; col[i*3+2]=c[2]; } } colAttr.needsUpdate=true; for(const lm of arcs) lm.color.setRGB(c[0],c[1],c[2]); };
    // cursor repel/magnify (CPU, raycast onto the sphere)
    const mouse=new T.Vector2(99,99); let mouseActive=false, dirty=false;
    window.addEventListener("mousemove",e=>{ mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1; mouseActive=true; },{passive:true});
    window.addEventListener("mouseout",()=>{ mouseActive=false; });
    const ray=new T.Raycaster(), sphereGeo=new T.Sphere(new T.Vector3(0,0,0),Rg*1.02), hit=new T.Vector3();
    const R_INF=2.4, PUSH=1.7;
    function repel(){
      let h=null;
      if(mouseActive){ group.updateMatrixWorld(); ray.setFromCamera(mouse,camera); if(ray.ray.intersectSphere(sphereGeo,hit)) h=group.worldToLocal(hit.clone()); }
      if(!h){ if(dirty){ pos.set(basePos); posAttr.needsUpdate=true; dirty=false; } return; }
      for(let i=0;i<N;i++){ const bx=basePos[i*3],by=basePos[i*3+1],bz=basePos[i*3+2], dx=bx-h.x,dy=by-h.y,dz=bz-h.z, d=Math.sqrt(dx*dx+dy*dy+dz*dz);
        if(d<R_INF){ const f=(1-d/R_INF)*PUSH/(d||1); pos[i*3]=bx+dx*f; pos[i*3+1]=by+dy*f; pos[i*3+2]=bz+dz*f; }
        else { pos[i*3]=bx; pos[i*3+1]=by; pos[i*3+2]=bz; } }
      posAttr.needsUpdate=true; dirty=true;
    }
    // scroll morph
    let targetRX=0,targetSpin=0,curRX=0,disp=0,targetDisp=0;
    function onScroll(){ const y=window.scrollY||document.documentElement.scrollTop||0, max=Math.max(1,document.body.scrollHeight-innerHeight), p=Math.min(1,y/max); targetRX=p*Math.PI*1.0; targetSpin=p*1.8; targetDisp=p*0.5; }
    window.addEventListener("scroll",onScroll,{passive:true}); onScroll();
    size(); window.addEventListener("resize",size);
    let running=true; document.addEventListener("visibilitychange",()=>{ running=!document.hidden; if(running) loop(); });
    function loop(){ if(!running) return;
      group.rotation.y+=0.0006; curRX+=(targetRX-curRX)*0.05; group.rotation.x=curRX; group.rotation.z=targetSpin*0.14;
      disp+=(targetDisp-disp)*0.05; group.scale.setScalar(1+disp);
      repel(); renderer.render(scene,camera); bgRAF=requestAnimationFrame(loop);
    }
    if(bgRAF) cancelAnimationFrame(bgRAF); loop();
  }

  /* ---------- background: drifting micro-shapes, rank-tinted, on every page ---------- */
  let bgRAF=0;
  function initBg(){
    const c=document.getElementById("bgfx"); if(!c) return;
    const ctx=c.getContext("2d"); if(bgRAF) cancelAnimationFrame(bgRAF);
    let W,H,parts,running=true;
    function mk(fromTop){
      return { x:Math.random()*W, y: fromTop ? (-20 - Math.random()*H*0.4) : Math.random()*H,
        s:2+Math.random()*4.5, kind:(Math.random()*4)|0, rot:Math.random()*6.283, vr:(Math.random()-.5)*0.02,
        vy:0.18+Math.random()*0.6, vx:(Math.random()-.5)*0.25, a:0.3+Math.random()*0.55, ci:(Math.random()*7)|0 };
    }
    function resize(){ W=c.width=innerWidth; H=c.height=innerHeight; const n=Math.min(150,Math.max(50,Math.floor(W*H/13000))); parts=[]; for(let i=0;i<n;i++) parts.push(mk(false)); }
    function colFor(p){
      // mostly rank color, sprinkle amber-spark / lichen / bone
      if(p.ci<4) return "rgba("+currentRankRGB+","+p.a+")";
      if(p.ci===4) return "rgba(255,184,41,"+p.a+")";
      if(p.ci===5) return "rgba(21,132,110,"+(p.a+0.1)+")";
      return "rgba(255,255,255,"+(p.a*0.6)+")";
    }
    function paint(){
      ctx.clearRect(0,0,W,H);
      for(const p of parts){
        ctx.fillStyle=colFor(p); ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.beginPath();
        const s=p.s;
        if(p.kind===0){ ctx.arc(0,0,s/2,0,7); }
        else if(p.kind===1){ ctx.moveTo(0,-s/1.4); ctx.lineTo(s/1.4,s/1.4); ctx.lineTo(-s/1.4,s/1.4); ctx.closePath(); }
        else if(p.kind===2){ ctx.rect(-s/2,-s/2,s,s); }
        else { ctx.moveTo(0,-s/1.3); ctx.lineTo(s/1.3,0); ctx.lineTo(0,s/1.3); ctx.lineTo(-s/1.3,0); ctx.closePath(); }
        ctx.fill(); ctx.restore();
      }
    }
    function step(){
      if(!running) return;
      for(const p of parts){ p.y+=p.vy; p.x+=p.vx; p.rot+=p.vr; if(p.y>H+24 || p.x<-24 || p.x>W+24){ const np=mk(true); for(const k in np) p[k]=np[k]; } }
      paint();
      bgRAF=requestAnimationFrame(step);
    }
    resize(); addEventListener("resize",resize);
    document.addEventListener("visibilitychange",()=>{ running=!document.hidden; if(running) step(); });
    step();                                   // always animate (motion is intended)
  }

  /* ---------- intro boot sequence (once per session, skippable) ---------- */
  function bootIntro(){
    try{ if(sessionStorage.getItem("aa_booted")) return; sessionStorage.setItem("aa_booted","1"); }catch(e){}
    const b=document.createElement("div"); b.id="boot";
    b.innerHTML=`<div class="btitle">ATT&amp;CK ACADEMY</div><div class="bsub">THREAT OPERATIONS TRAINING</div>
      <div class="blines"></div><div class="bbar"><i></i></div><div class="skip">click or press any key to skip</div>`;
    document.body.appendChild(b);
    const lines=["> initializing kill-chain modules ...","> loading 14 enterprise tactics ...","> syncing MITRE ATT&CK group intel ...","> operator rank: "+RANKS[rankIndex(state.xp)].name+" · Lvl "+(rankIndex(state.xp)+1),"> systems ready."];
    const out=b.querySelector(".blines"), bar=b.querySelector(".bbar i");
    let li=0, done=false;
    function finish(){ if(done) return; done=true; b.classList.add("gone"); setTimeout(()=>b.remove(),600); document.removeEventListener("keydown",finish); }
    b.addEventListener("click",finish); document.addEventListener("keydown",finish);
    if(window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches){ finish(); return; }
    function nextLine(){ if(done) return; if(li>=lines.length){ bar.style.width="100%"; setTimeout(finish,450); return; }
      out.textContent=lines.slice(0,li+1).join("\n"); bar.style.width=Math.round((li+1)/lines.length*100)+"%"; li++; playSound("click"); setTimeout(nextLine,340); }
    setTimeout(nextLine,260);
  }

  /* ---------- boot ---------- */
  loadState();                          // restore progress
  // randomize MCQ option order each load so the correct answer isn't always in the same slot
  function shuffleQ(q){
    if(!q || !q.opts) return;
    const correct=q.opts[q.a];
    for(let i=q.opts.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; const t=q.opts[i]; q.opts[i]=q.opts[j]; q.opts[j]=t; }
    q.a=q.opts.indexOf(correct);
  }
  TACTICS.forEach(t=>t.quiz.forEach(shuffleQ));
  INTERVIEW.forEach(it=>{ if(it.type==="mcq") shuffleQ(it); });
  EXAM.forEach(shuffleQ);
  function shuffleArr(a){ for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
  shuffleArr(EXAM);                                  // randomize exam question order each load
  ivOrder = shuffleArr(INTERVIEW.map((_,i)=>i));     // randomize interview order (keep original indices)
  setRankTheme(rankIndex(state.xp));    // apply rank color theme before paint
  if(window.THREE){ try{ initGlobe(); }catch(e){ console.warn("WebGL globe failed, using 2D field:",e); initBg(); } }
  else { initBg(); }                    // no Three.js (offline) -> 2D fallback
  shell();
  render();
  updateStreakUI();
  updateHud();
  bootIntro();

  // ---- authorship deterrent (the real proof of authorship is this repo's git history) ----
  try{
    console.log("%c ATT&CK Academy ","background:#ff7a18;color:#000;font-weight:700;padding:3px 8px;border-radius:4px;font-size:13px;");
    console.log("Built by "+AUTHOR.name+"  ·  "+AUTHOR.url);
  }catch(e){}
  function attributionGuard(){
    try{
      const ok=[].some.call(document.querySelectorAll("a"),a=>a.href&&a.href.indexOf("harisankarsprasad")>=0);
      if(!ok){
        let b=document.getElementById("attrBadge");
        if(!b){ b=document.createElement("div"); b.id="attrBadge";
          b.style.cssText="position:fixed;right:12px;bottom:12px;z-index:99999;font:12px/1.4 system-ui,sans-serif;background:rgba(5,7,11,.92);color:#fff;border:1px solid #ff7a18;border-radius:10px;padding:7px 11px;box-shadow:0 0 14px rgba(255,122,24,.4)";
          document.body.appendChild(b); }
        b.innerHTML='Built by '+AUTHOR.name+' · <a href="'+AUTHOR.url+'" target="_blank" rel="noopener" style="color:#ff7a18;text-decoration:none">LinkedIn</a>';
      }
    }catch(e){}
  }
  attributionGuard(); setInterval(attributionGuard,4000);
})();
