<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;700&display=swap');
  :root{
    --hud:"Orbitron","IBM Plex Sans","Segoe UI",system-ui,sans-serif;
    --bg:#0a0e14;
    --panel:#10161f;
    --panel-2:#161e2a;
    --ink:#dfe7f2;
    --ink-dim:#8c9bb0;
    --ink-faint:#5b6b7a;
    --line:#1f2a38;
    --amber:#ffb454;
    --amber-soft:#3a2c14;
    --red:#ff5c5c;
    --green:#7ee787;
    --cyan:#56d4dd;
    --violet:#b18cff;
    --grid: rgba(86,212,221,.05);
    /* rank theme (driven by JS setRankTheme) */
    --rank:#56d4dd;
    --rank-rgb:86,212,221;
  }
  :root{transition:--rank .8s linear}
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:"IBM Plex Sans","Segoe UI",system-ui,sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;
    background-image:
      linear-gradient(var(--grid) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:46px 46px;
  }
  code,.mono,.kbd,.tag,.tid{font-family:"IBM Plex Mono","SF Mono",ui-monospace,Menlo,Consolas,monospace}
  a{color:var(--cyan);text-decoration:none}
  a:hover{text-decoration:underline}

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:50;
    display:flex;align-items:center;gap:18px;
    padding:10px 22px;background:rgba(10,14,20,.82);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;letter-spacing:.5px}
  .brand .dot{width:11px;height:11px;border-radius:2px;background:var(--amber);box-shadow:0 0 12px var(--amber)}
  .brand small{color:var(--ink-dim);font-weight:400;letter-spacing:0}
  .topbar .spacer{flex:1}
  .streak{
    display:flex;align-items:center;gap:9px;padding:6px 13px;
    border:1px solid var(--line);border-radius:8px;background:var(--panel);
    font-size:13px;
  }
  .streak .flame{font-size:17px;filter:grayscale(1);opacity:.45;transition:.3s}
  .streak.lit .flame{filter:none;opacity:1}
  .streak b{color:var(--amber)}
  .progress-mini{font-size:12px;color:var(--ink-dim)}
  .progress-mini b{color:var(--green)}

  /* ---------- layout ---------- */
  .wrap{display:flex;max-width:1500px;margin:0 auto}
  .side{
    width:268px;flex:none;border-right:1px solid var(--line);
    height:calc(100vh - 53px);position:sticky;top:53px;overflow-y:auto;
    padding:18px 12px 60px;background:rgba(16,22,31,.4);
  }
  .side h4{font-size:11px;letter-spacing:1.5px;color:var(--ink-faint);text-transform:uppercase;margin:18px 10px 8px}
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:7px;
    cursor:pointer;color:var(--ink-dim);font-size:13.5px;border:1px solid transparent;
  }
  .nav-item:hover{background:var(--panel);color:var(--ink)}
  .nav-item.active{background:var(--panel-2);color:var(--ink);border-color:var(--line)}
  .nav-item .n{
    font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-faint);
    width:22px;text-align:right;flex:none;
  }
  .nav-item .chk{margin-left:auto;color:var(--green);opacity:0;font-size:13px}
  .nav-item.done .chk{opacity:1}
  .nav-item.done .n{color:var(--green)}

  .main{flex:1;min-width:0;padding:30px 46px 120px;max-width:980px}

  /* ---------- hero ---------- */
  .hero{padding:40px 0 26px;border-bottom:1px solid var(--line);margin-bottom:30px}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:12px;letter-spacing:3px;color:var(--amber);text-transform:uppercase}
  .hero h1{font-size:46px;line-height:1.05;margin:14px 0 16px;font-weight:800;letter-spacing:-1px}
  .hero h1 span{color:var(--amber)}
  .hero p{color:var(--ink-dim);font-size:17px;max-width:680px}
  .hero-meta{display:flex;gap:26px;margin-top:24px;flex-wrap:wrap}
  .hero-meta div{font-size:13px;color:var(--ink-dim)}
  .hero-meta b{display:block;font-size:24px;color:var(--ink);font-family:"IBM Plex Mono",monospace}

  /* ---------- section / module ---------- */
  .module{display:none;animation:fade .35s ease}
  .module.show{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .mod-head{display:flex;align-items:flex-start;gap:18px;margin-bottom:8px}
  .mod-num{
    font-family:"IBM Plex Mono",monospace;font-size:13px;color:var(--bg);
    background:var(--amber);padding:4px 10px;border-radius:6px;font-weight:700;flex:none;margin-top:6px;
  }
  .mod-head h2{font-size:33px;margin:0;letter-spacing:-.5px;font-weight:800}
  .timechip{
    display:inline-flex;align-items:center;gap:7px;font-family:"IBM Plex Mono",monospace;
    font-size:12px;color:var(--cyan);border:1px solid var(--line);border-radius:20px;
    padding:4px 12px;margin:14px 0 4px;background:var(--panel);
  }
  .lede{font-size:16px;color:var(--ink-dim);margin:16px 0 26px;max-width:720px}

  h3.block{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--amber);margin:36px 0 4px;font-family:"IBM Plex Mono",monospace}
  .block-rule{height:1px;background:var(--line);margin-bottom:18px}

  /* ---------- story ---------- */
  .story{
    border-left:3px solid var(--violet);background:linear-gradient(90deg,rgba(177,140,255,.07),transparent 70%);
    padding:18px 22px;border-radius:0 10px 10px 0;margin:8px 0 14px;
  }
  .story .who{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--violet);letter-spacing:1px;margin-bottom:6px}
  .story p{margin:0 0 8px}
  .story p:last-child{margin-bottom:0}
  .story em{color:var(--ink);font-style:normal;border-bottom:1px dotted var(--violet)}

  /* ---------- concept ---------- */
  .concept{font-size:15.5px}
  .concept p{margin:0 0 14px}
  .concept strong{color:var(--ink)}

  /* ---------- techniques ---------- */
  .tech{
    border:1px solid var(--line);border-radius:10px;background:var(--panel);
    margin:14px 0;overflow:hidden;
  }
  .tech-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none}
  .tech-head:hover{background:var(--panel-2)}
  .tid{font-size:12px;color:var(--amber);background:var(--amber-soft);padding:3px 8px;border-radius:5px;flex:none}
  .tech-head .t-name{font-weight:600;font-size:15.5px}
  .tech-head .caret{margin-left:auto;color:var(--ink-faint);transition:.25s}
  .tech.open .caret{transform:rotate(90deg)}
  .tech-body{display:none;padding:0 18px 18px;border-top:1px solid var(--line)}
  .tech.open .tech-body{display:block}
  .tech-body p{margin:14px 0 10px;font-size:14.5px;color:var(--ink-dim)}
  .tech-body p strong{color:var(--ink)}
  .sub{font-family:"IBM Plex Mono",monospace;font-size:12.5px;color:var(--ink-dim);margin:4px 0;padding-left:14px;border-left:2px solid var(--line)}
  .sub b{color:var(--cyan)}

  .apt-row{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0 2px}
  .apt{
    font-family:"IBM Plex Mono",monospace;font-size:11.5px;padding:4px 9px;border-radius:20px;
    background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
  }
  .apt b{color:var(--red)}

  /* ---------- incident ---------- */
  .incident{
    border:1px solid var(--line);border-left:3px solid var(--red);border-radius:0 10px 10px 0;
    background:rgba(255,92,92,.045);padding:15px 18px;margin:14px 0;
  }
  .incident .lbl{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:1.5px;color:var(--red);text-transform:uppercase;margin-bottom:6px}
  .incident h5{margin:0 0 6px;font-size:15px}
  .incident p{margin:0;font-size:14px;color:var(--ink-dim)}

  /* ---------- interview line ---------- */
  .say{
    border:1px solid var(--line);border-left:3px solid var(--green);border-radius:0 10px 10px 0;
    background:rgba(126,231,135,.05);padding:15px 18px;margin:14px 0;
  }
  .say .lbl{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:1.5px;color:var(--green);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:7px}
  .say p{margin:0;font-size:15px;font-style:italic;color:var(--ink)}
  .say p:before{content:"“";color:var(--green)}
  .say p:after{content:"”";color:var(--green)}

  /* ---------- flowchart wrap ---------- */
  .flow{margin:22px 0;border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:18px;overflow-x:auto}
  .flow svg{display:block;width:100%;height:auto;min-width:560px}
  .flow-cap{font-size:12px;color:var(--ink-faint);font-family:"IBM Plex Mono",monospace;margin-top:10px;text-align:center}

  /* ---------- quiz ---------- */
  .quiz{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:22px;margin:34px 0 10px}
  .quiz h3{margin:0 0 4px;font-size:18px}
  .quiz .qsub{color:var(--ink-dim);font-size:13px;margin-bottom:18px}
  .q{margin:18px 0;padding-bottom:18px;border-bottom:1px solid var(--line)}
  .q:last-of-type{border-bottom:none}
  .q .qq{font-weight:600;margin-bottom:12px;font-size:15px}
  .q .qq .qn{color:var(--amber);font-family:"IBM Plex Mono",monospace;margin-right:8px}
  .opt{
    display:block;padding:11px 15px;border:1px solid var(--line);border-radius:8px;margin:8px 0;
    cursor:pointer;font-size:14.5px;background:var(--panel-2);transition:.15s;
  }
  .opt:hover{border-color:var(--ink-faint)}
  .opt.correct{border-color:var(--green);background:rgba(126,231,135,.12);color:var(--green)}
  .opt.wrong{border-color:var(--red);background:rgba(255,92,92,.1);color:var(--red)}
  .opt.lock{pointer-events:none;opacity:.7}
  .opt.lock.correct,.opt.lock.wrong{opacity:1}
  .explain{display:none;margin-top:10px;padding:12px 15px;border-radius:8px;background:var(--panel-2);border:1px solid var(--line);font-size:13.5px;color:var(--ink-dim)}
  .explain.show{display:block}
  .explain b{color:var(--ink)}
  .quiz-done{
    display:none;margin-top:18px;padding:14px 18px;border-radius:9px;
    background:rgba(126,231,135,.08);border:1px solid var(--green);color:var(--green);font-size:14px;
  }
  .quiz-done.show{display:block}

  .mod-foot{display:flex;justify-content:space-between;align-items:center;margin-top:40px;padding-top:22px;border-top:1px solid var(--line)}
  .btn{
    font-family:inherit;font-size:14px;padding:11px 20px;border-radius:8px;cursor:pointer;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);transition:.15s;
  }
  .btn:hover{border-color:var(--ink-faint)}
  .btn.primary{background:var(--amber);color:#0a0e14;border-color:var(--amber);font-weight:700}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .btn.ghost{background:transparent}

  .callout{border:1px dashed var(--line);border-radius:9px;padding:14px 17px;margin:18px 0;font-size:13.5px;color:var(--ink-dim);background:rgba(255,180,84,.03)}
  .callout b{color:var(--amber)}

  .matrix-strip{display:flex;gap:6px;overflow-x:auto;padding:4px 0 14px;margin-bottom:6px}
  .ms-cell{flex:none;min-width:74px;text-align:center;font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--ink-faint);border:1px solid var(--line);border-radius:6px;padding:7px 4px;background:var(--panel)}
  .ms-cell.cur{border-color:var(--amber);color:var(--amber)}
  .ms-cell.done{border-color:var(--green);color:var(--green)}

  /* ---------- home progress bar ---------- */
  .progblock{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:20px 22px;margin:8px 0 6px}
  .progblock .ptop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;flex-wrap:wrap;gap:6px}
  .progblock .ptop h3{margin:0;font-size:16px}
  .progblock .ppct{font-family:"IBM Plex Mono",monospace;color:var(--green);font-size:22px;font-weight:700}
  .ptrack{height:14px;border-radius:8px;background:var(--panel-2);border:1px solid var(--line);overflow:hidden}
  .pfill{height:100%;border-radius:7px 0 0 7px;background:linear-gradient(90deg,var(--cyan),var(--green));transition:width .5s ease;box-shadow:0 0 12px rgba(126,231,135,.35)}
  .pmeta{display:flex;gap:20px;flex-wrap:wrap;margin-top:13px;font-size:12.5px;color:var(--ink-dim);font-family:"IBM Plex Mono",monospace}
  .pmeta b{color:var(--ink)}
  .streak.pulse .flame{animation:flamepop .6s ease}
  @keyframes flamepop{0%{transform:scale(1)}40%{transform:scale(1.5)}100%{transform:scale(1)}}

  /* ---------- interview prep ---------- */
  .iv-intro{border-left:3px solid var(--cyan);background:linear-gradient(90deg,rgba(86,212,221,.07),transparent 70%);padding:16px 20px;border-radius:0 10px 10px 0;margin:8px 0 22px}
  .iv-intro p{margin:0 0 8px}.iv-intro p:last-child{margin:0}
  .iv-q{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:20px 22px;margin:16px 0}
  .iv-q .iv-tag{display:inline-flex;align-items:center;gap:7px;font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:1px solid var(--line);margin-bottom:12px}
  .iv-q .iv-tag.scenario{color:var(--violet);border-color:rgba(177,140,255,.4)}
  .iv-q .iv-tag.mcq{color:var(--cyan);border-color:rgba(86,212,221,.4)}
  .iv-q .iv-topic{color:var(--ink-faint);font-size:11px;font-family:"IBM Plex Mono",monospace;margin-left:8px;letter-spacing:.5px}
  .iv-scn{font-size:14.5px;color:var(--ink-dim);font-style:italic;border-left:2px solid var(--line);padding-left:14px;margin:0 0 14px}
  .iv-ask{font-weight:600;font-size:16px;margin:0 0 16px;color:var(--ink)}
  .iv-ask .qn{color:var(--amber);font-family:"IBM Plex Mono",monospace;margin-right:8px}
  .iv-model{display:none;margin-top:14px;padding:16px 18px;border-radius:9px;background:var(--panel-2);border:1px solid var(--green);font-size:14px;color:var(--ink-dim)}
  .iv-model.show{display:block;animation:fade .3s ease}
  .iv-model .ml{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--green);margin-bottom:8px}
  .iv-model b{color:var(--ink)}
  .iv-model ul{margin:10px 0 0;padding-left:18px}.iv-model li{margin:5px 0}
  .iv-q .done-pill{display:none;margin-left:auto;color:var(--green);font-size:12px;font-family:"IBM Plex Mono",monospace}
  .iv-q.answered .done-pill{display:inline}
  .iv-q .iv-head{display:flex;align-items:center}

  /* ---------- author footer / card ---------- */
  .author-foot{display:flex;align-items:center;gap:10px;justify-content:center;margin:54px 0 0;padding:18px 0 0;border-top:1px solid var(--line);font-size:13px;color:var(--ink-faint)}
  .author-foot a{display:inline-flex;align-items:center;gap:7px;color:var(--ink-dim)}
  .author-foot a:hover{color:var(--cyan);text-decoration:none}
  .author-foot svg{flex:none}
  .author-card{display:flex;align-items:center;gap:16px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(100deg,rgba(86,212,221,.06),var(--panel) 60%);padding:18px 22px;margin:30px 0 6px}
  .author-card .li-logo{flex:none;width:42px;height:42px;border-radius:9px;background:#0a66c2;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(10,102,194,.45)}
  .author-card .ac-text{min-width:0}
  .author-card .ac-by{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-faint)}
  .author-card .ac-name{font-size:17px;font-weight:700;color:var(--ink);margin:2px 0 1px}
  .author-card .ac-link{font-size:13px}
  .author-card .ac-link a{color:var(--cyan)}

  /* ---------- practitioner depth + detection ---------- */
  .t-detail{margin:12px 0 6px;font-size:14px;color:var(--ink-dim);border-left:2px solid var(--violet);padding-left:12px}
  .detect{margin:12px 0 4px;font-size:13px;color:var(--ink-dim);background:rgba(86,212,221,.05);border:1px solid var(--line);border-radius:8px;padding:9px 12px}
  .detect .dl{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.5px;color:var(--cyan);margin-right:7px}
  /* ---------- group links ---------- */
  .apt.apt-link{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--ink)}
  .apt.apt-link:hover{border-color:var(--cyan);background:var(--panel);text-decoration:none}
  .apt .gid{color:var(--ink-faint);font-size:10.5px}
  .apt.apt-link:hover .gid{color:var(--cyan)}
  /* ---------- incident why/how/outcome + latest ---------- */
  .incident .wl{display:inline-block;min-width:84px;font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--red);margin-right:6px;vertical-align:top}
  .incident .wl.how{color:var(--amber)}
  .incident .wl.out{color:var(--green)}
  .incident p{margin:9px 0;font-size:14px;color:var(--ink-dim)}
  .latest{margin-top:13px;padding:11px 13px;border-radius:8px;background:rgba(126,231,135,.06);border:1px dashed var(--green);font-size:13.5px;color:var(--ink-dim)}
  .latest .ll{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.5px;color:var(--green);margin-right:7px}
  /* ---------- nav search ---------- */
  .navsearch-wrap{padding:0 10px 10px}
  #navsearch{width:100%;padding:8px 11px;background:var(--panel-2);color:var(--ink);border:1px solid var(--line);border-radius:7px;font-family:inherit;font-size:13px}
  #navsearch::placeholder{color:var(--ink-faint)}
  #navsearch:focus{outline:none;border-color:var(--cyan)}
  .nav-empty{padding:8px 12px;font-size:12px;color:var(--ink-faint)}
  /* ---------- reset progress ---------- */
  .reset-wrap{margin:36px 0 6px;padding-top:20px;border-top:1px solid var(--line);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .reset-btn{border-color:var(--red);color:var(--red)}
  .reset-btn:hover{background:rgba(255,92,92,.1);border-color:var(--red)}
  .reset-note{font-size:12px;color:var(--ink-faint);max-width:430px}

  /* ===================== HUD / GAMIFICATION ===================== */
  .hud-font{font-family:var(--hud);letter-spacing:.5px}
  /* topbar: rank + xp + sound */
  .rankpill{display:flex;align-items:center;gap:9px;padding:5px 12px;border:1px solid var(--line);border-radius:8px;background:var(--panel);cursor:pointer}
  .rankpill:hover{border-color:var(--cyan)}
  .rankpill .lvl{font-family:var(--hud);font-weight:900;font-size:13px;color:var(--cyan);text-shadow:0 0 8px rgba(86,212,221,.5)}
  .rankpill .rname{font-size:12.5px;color:var(--ink);font-weight:600}
  .xpbar{width:96px;height:7px;border-radius:6px;background:var(--panel-2);border:1px solid var(--line);overflow:hidden}
  .xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));width:0;transition:width .6s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 8px rgba(126,231,135,.5)}
  .sndbtn{background:var(--panel);border:1px solid var(--line);color:var(--ink-dim);border-radius:8px;width:34px;height:32px;cursor:pointer;font-size:14px}
  .sndbtn:hover{border-color:var(--cyan);color:var(--cyan)}
  /* animated streak flame */
  .streak .flame{display:inline-block;transform-origin:50% 80%}
  .streak.lit .flame{animation:flicker 1.6s ease-in-out infinite;filter:drop-shadow(0 0 6px rgba(255,160,60,.8))}

      h: "APT29 / SVR — long-game targeting",
      p: "Russia's APT29 (Cozy Bear) is documented building detailed target dossiers from public and breached sources before launching tailored spearphishing — the approach behind the SolarWinds-era campaigns. Patient identity and infrastructure recon precedes every move."
    },
    say: "Recon is the cheapest phase for the attacker and the hardest for me to see. Most of it is passive — LinkedIn, job ads, DNS, breach dumps — so my defense isn't detection, it's reducing what I leak: trim public metadata, monitor for my domains in breach data, and assume the attacker already knows my org chart.",
    quiz: [
      {
        q:"An attacker reads your job postings to learn you run a specific firewall brand. Which recon type is this?",
        opts:["Active reconnaissance — directly probing the target's systems","Passive reconnaissance — collecting data without touching them","Vulnerability scanning — actively testing services for flaws","Internal reconnaissance — enumerating from inside a breach"],
        a:1,
        ex:"<b>Passive.</b> Reading public job ads never touches your systems, so it leaves no trace on your side. Active recon (e.g. port scanning) is what you can actually detect."
      },
      {
        q:"Why is gathering email addresses (T1589.002) so valuable to an attacker?",
        opts:["It lets the attacker decrypt intercepted traffic","It builds the target list for a phishing campaign","It reveals which antivirus product the company runs","It directly hands the attacker domain admin rights"],
        a:1,
        ex:"Email harvesting feeds the <b>Initial Access</b> phishing campaign. One known address reveals the org's email format, so the rest can be guessed."
      },
      {
        q:"Which is the best defensive mindset for the Reconnaissance tactic?",
        opts:["Block every inbound port at the perimeter firewall","Assume your staff and stack are already known, and reduce what you leak","Deploy additional antivirus across all endpoints","Rotate every user's password on a daily basis"],
        a:1,
        ex:"You can't stop passive recon. The realistic posture is <b>minimizing public exposure</b> and assuming your org chart and tech stack are already known."
      },
    ]
  },

  /* ===================== 2. RESOURCE DEV ===================== */
  {
    id:"resource",
    n:"TA0042",
    name:"Resource Development",
    mins:15,
    lede:"The attacker builds or buys the gear: domains, servers, malware, stolen accounts. This happens on the attacker's side, so you almost never see it — but knowing it exists explains where their infrastructure comes from.",
    story:{
      who:"STORMVALE — Day 3",
      html:`<p>STORMVALE registers <em>northwind-payroll-secure.com</em> — a look-alike domain. They buy a cheap cloud VPS to host their command-and-control (C2) server.</p>
      <p>They don't write malware from scratch. They rent a <em>Cobalt Strike</em>-style framework and buy a code-signing certificate on a criminal market so their payload looks "trusted."</p>
      <p>By the time they email Priya, the trap, the domain, and the catcher server all already exist.</p>`
    },
    concept:`<p><strong>Resource Development</strong> is the attacker provisioning their toolkit before the attack. Think of it as setting up the criminal workshop.</p>
    <p>This includes: registering domains, standing up C2 servers, acquiring/developing malware, buying stolen accounts and certificates, and compromising third-party servers to relay through.</p>
    <p>Defensive value: this phase produces <strong>indicators</strong> — newly-registered look-alike domains, known-bad C2 IPs, malicious certificates. Threat-intel feeds let you block this infrastructure <em>before</em> it's used against you.</p>`,
    techniques:[
      {
        tid:"T1583",name:"Acquire Infrastructure",
        body:`<p>Buying domains, VPS servers, and cloud accounts to run the operation. Look-alike domains (typosquats) are registered here.</p>`,
        subs:[{id:"T1583.001",name:"Domains",note:"typosquat / look-alike"},{id:"T1583.006",name:"Web Services",note:"abuse legit cloud for C2"}],
        apts:["APT29","Sandworm","Lazarus"]
      },
      {
        tid:"T1587",name:"Develop Capabilities",
        body:`<p>Building custom malware, exploits, or certificates in-house. Nation-state groups develop bespoke tooling that signatures won't catch.</p>`,
        subs:[{id:"T1587.001",name:"Malware",note:"custom implants"},{id:"T1587.002",name:"Code Signing Certs",note:"make payload look trusted"}],
        apts:["Lazarus","APT41","Turla"]
      },
      {
        tid:"T1588",name:"Obtain Capabilities",
        body:`<p>Buying rather than building — purchasing exploits, malware, or stolen certs on criminal markets. Cheaper and faster than developing.</p>`,
        subs:[{id:"T1588.003",name:"Code Signing Certs",note:"stolen / bought"},{id:"T1588.004",name:"Digital Certificates",note:"for HTTPS C2"}],
        apts:["FIN7","APT41"]
      },
    ],
    flow:"resource",
    incident:{
      h:"Lazarus Group — fake job lures + custom tooling",
      p:"North Korea's Lazarus builds elaborate fake recruiter personas and infrastructure, then delivers custom-developed implants. Their 'Operation Dream Job' campaigns show heavy investment in resource development before any victim is contacted."
    },
    say:"Resource development happens entirely on the attacker's turf, so I won't see it directly — but it's where indicators are born. Newly-registered look-alike domains and known C2 IPs come from this phase, which is exactly why threat-intel feeds and domain-monitoring let me block infrastructure before it's ever fired at me.",
    quiz:[
      {q:"An attacker registers 'paypa1-secure.com' to use in a future phish. Which tactic is this?",
       opts:["Reconnaissance","Resource Development","Initial Access","Persistence"],a:1,
       ex:"<b>Resource Development.</b> Registering attacker-controlled domains is acquiring infrastructure (T1583.001). It hasn't been used against a victim yet."},
      {q:"Why do attackers buy stolen code-signing certificates?",
       opts:["To encrypt their command-and-control traffic","To make malware look trusted and bypass some controls","To scan target networks for open ports","To harvest employee email addresses"],a:1,
       ex:"A valid-looking signature makes a payload look legitimate, helping it slip past trust-based defenses. This is <b>Obtain/Develop Capabilities</b>."},
      {q:"What practical defensive value does understanding this tactic give a defender?",
       opts:["You can remotely patch the attacker's staging server","You can block their infrastructure via threat intel before use","You can intercept and read the attacker's email","Understanding it gives no real defensive value"],a:1,
       ex:"This phase creates <b>indicators</b> (domains, IPs, certs). Threat-intel feeds let you pre-block known-bad infrastructure."},
    ]
  },

  /* ===================== 3. INITIAL ACCESS ===================== */
  {
    id:"initial",
    n:"TA0001",
    name:"Initial Access",
    mins:15,
    lede:"The first foothold. Every breach has this moment — the door opening. Phishing, exploited public servers, valid stolen accounts, or supply-chain poison.",
    story:{
      who:"STORMVALE — Day 5",
      html:`<p>Priya gets an email from "Northwind Payroll" about a salary revision, with a link to that look-alike domain. She enters her password. STORMVALE now has <em>valid credentials</em>.</p>
      <p>To be safe they also send Dan (the IT admin) a document with a malicious macro. He opens it. A beacon calls home to the C2 server.</p>
      <p>Two doors are now open: one stolen login, one infected admin laptop. The attacker is <em>inside</em>.</p>`
    },
    concept:`<p><strong>Initial Access</strong> is how the attacker gets their first foothold in your environment. This is the breach moment everyone talks about.</p>
    <p>The dominant routes, in roughly the order they appear in real incidents:</p>
    <p><strong>Phishing</strong> — still the #1 entry. A link steals credentials or an attachment runs code.<br>
    <strong>Exploiting public-facing apps</strong> — an unpatched VPN, web server, or email server (this is how many "zero-day" headline breaches start).<br>
    <strong>Valid accounts</strong> — logging in with credentials bought or phished. No malware needed, so it's quiet.<br>
    <strong>Supply chain</strong> — poisoning trusted software so the victim installs it themselves.</p>`,
    techniques:[
      {
        tid:"T1566",name:"Phishing",
        body:`<p>Tricking a user into clicking a link or opening an attachment. The most common initial access vector by far.</p>`,
        subs:[{id:"T1566.001",name:"Spearphishing Attachment",note:"malicious macro/PDF"},{id:"T1566.002",name:"Spearphishing Link",note:"credential-harvest page"}],
        apts:["APT28","APT29","Kimsuky","TA505"]
      },
      {
        tid:"T1190",name:"Exploit Public-Facing Application",
        body:`<p>Attacking an internet-exposed app — VPN, web app, mail server — using a known or zero-day vulnerability. Source of many mass-exploitation events.</p>`,
        subs:[],
        apts:["APT41","Sandworm","Volt Typhoon"]
      },
      {
        tid:"T1078",name:"Valid Accounts",
        body:`<p>Using legitimate stolen credentials to log in. Generates no malware and looks like a normal user — very hard to catch without behavioral analytics or MFA.</p>`,
        subs:[{id:"T1078.004",name:"Cloud Accounts",note:"SaaS / cloud console logins"}],
        apts:["APT29","Scattered Spider","LAPSUS$"]
      },
      {
        tid:"T1195",name:"Supply Chain Compromise",
        body:`<p>Compromising software before it reaches the victim, so the victim installs the backdoor themselves. Devastating reach from one breach.</p>`,
        subs:[{id:"T1195.002",name:"Software Supply Chain",note:"poisoned update"}],
        apts:["APT29","APT41"]
      },
    ],
    flow:"initial",
    incident:{
      h:"SolarWinds (2020) — APT29 supply chain",
      p:"APT29 inserted a backdoor ('SUNBURST') into SolarWinds Orion software updates. ~18,000 organizations installed the trojanized update themselves, giving the attacker initial access into thousands of networks from a single compromise — the textbook supply-chain case (T1195.002)."
    },
    say:"When I think Initial Access, I think four doors: phishing, exploiting an internet-facing app, valid stolen accounts, and supply chain. Phishing is still the most common, but the scariest is supply chain — SolarWinds is the example — because the victim installs the backdoor themselves and one compromise scales to thousands of networks.",
    quiz:[
      {q:"A user opens a Word doc that runs a macro and beacons to a C2 server. Which technique?",
       opts:["Valid Accounts","Spearphishing Attachment","Exploit Public-Facing Application","Supply Chain Compromise"],a:1,
       ex:"<b>Spearphishing Attachment (T1566.001).</b> A malicious file delivered by email that executes on open."},
      {q:"Why is 'Valid Accounts' (T1078) especially hard to detect?",
       opts:["It relies on heavy, noisy malware on disk","It looks like normal, legitimate user activity","It only works against Linux-based systems","It trips antivirus the moment it runs"],a:1,
       ex:"No malware, no exploit — just a real login. Detection needs <b>MFA + behavioral analytics</b> (impossible travel, odd hours), not signatures."},
      {q:"SolarWinds is the canonical example of which initial-access technique?",
       opts:["Phishing","Supply Chain Compromise","Exploit Public-Facing Application","Brute Force"],a:1,
       ex:"<b>Supply Chain Compromise (T1195.002).</b> The backdoor rode a trusted software update, so victims installed it themselves."},
    ]
  },

  /* ===================== 4. EXECUTION ===================== */
  {
    id:"execution",
    n:"TA0002",
    name:"Execution",
    mins:15,
    lede:"Getting code to actually run on the victim machine. Access is useless until something executes — a script, a command, a malicious binary.",
    story:{
      who:"STORMVALE — Day 5, minutes later",
      html:`<p>Dan's macro doesn't carry the full malware — that would be too noisy. Instead it runs a one-line <em>PowerShell</em> command that downloads the real payload into memory and executes it. Nothing is written to disk yet.</p>
      <p>Using PowerShell — a tool Windows ships with — means STORMVALE is "living off the land": using trusted built-in tools so security software is less suspicious.</p>`
    },
    concept:`<p><strong>Execution</strong> covers techniques that run attacker-controlled code on a system. Initial access opens the door; execution is the attacker actually doing something once inside.</p>
    <p>The defining modern trend here is <strong>"Living off the Land" (LOLBins)</strong> — abusing legitimate built-in tools (PowerShell, WMI, scheduled tasks, scripting hosts) instead of dropping obvious malware. Why? Trusted tools draw less suspicion and leave fewer files to detect.</p>
    <p>Defender focus: don't just hunt malicious files — hunt malicious <em>behavior</em> from legitimate tools (e.g., PowerShell downloading from the internet and running it in memory).</p>`,
    techniques:[
      {
        tid:"T1059",name:"Command and Scripting Interpreter",
        body:`<p>Abusing shells and scripting engines to run commands. PowerShell is the most abused on Windows; bash on Linux.</p>`,
        subs:[{id:"T1059.001",name:"PowerShell",note:"most common LOLBin"},{id:"T1059.003",name:"Windows Command Shell",note:"cmd.exe"},{id:"T1059.005",name:"Visual Basic",note:"macros"}],
        apts:["APT28","FIN7","Lazarus","Wizard Spider"]
      },
      {
        tid:"T1204",name:"User Execution",
        body:`<p>Relying on a human to run the malicious thing — double-click the file, click the link, enable the macro. The attacker needs the user's cooperation.</p>`,
        subs:[{id:"T1204.001",name:"Malicious Link",note:"user clicks"},{id:"T1204.002",name:"Malicious File",note:"user opens"}],
        apts:["TA505","Kimsuky","FIN7"]
      },
      {
        tid:"T1053",name:"Scheduled Task/Job",
        body:`<p>Using the OS scheduler to run code. Doubles as persistence — the task survives reboots. (Appears in Execution <em>and</em> Persistence.)</p>`,
        subs:[{id:"T1053.005",name:"Scheduled Task",note:"Windows Task Scheduler"}],
        apts:["APT29","FIN7","Wizard Spider"]
      },
    ],
    flow:"execution",
    incident:{
      h:"FIN7 — living off the land for fraud",
      p:"FIN7, a financially-motivated group behind huge payment-card theft, leans heavily on malicious documents that launch PowerShell and JavaScript rather than dropping obvious binaries — making detection a behavioral problem, not a file-signature one."
    },
    say:"Execution is where modern detection gets hard, because attackers live off the land — they abuse PowerShell, WMI, and scheduled tasks instead of dropping malware that antivirus would flag. So I don't just hunt bad files; I hunt bad behavior, like PowerShell pulling a payload from the internet and running it straight in memory.",
    quiz:[
      {q:"An attacker uses built-in PowerShell to download and run a payload in memory. This approach is called:",
       opts:["Zero-day exploitation","Living off the land","Brute forcing","Supply chain attack"],a:1,
       ex:"<b>Living off the land (LOLBins).</b> Abusing trusted built-in tools (T1059.001 PowerShell) to avoid dropping detectable malware."},
      {q:"Why do attackers prefer PowerShell over custom malware for execution?",
       opts:["It is simply faster for an operator to type","It's a trusted built-in tool that raises less suspicion","It is the only scripting language Windows supports","It automatically encrypts all of its own activity"],a:1,
       ex:"Trusted tools blend in and minimize disk artifacts, making file-based detection less effective."},
      {q:"User Execution (T1204) requires what to succeed?",
       opts:["A reliable zero-day exploit to fire","A human to open or click the malicious item","Pre-existing domain administrator rights","An open inbound firewall port"],a:1,
       ex:"<b>User Execution</b> depends on the victim performing the action — opening the file or clicking the link. That's why awareness training matters here."},
    ]
  },

  /* ===================== 5. PERSISTENCE ===================== */
  {
    id:"persistence",
    n:"TA0003",
    name:"Persistence",
    mins:15,
    lede:"Surviving reboots, logouts, and password resets. The attacker wants to keep their foothold even if the machine restarts or you change a password.",
    story:{
      who:"STORMVALE — Day 6",
      html:`<p>STORMVALE knows Dan might reboot his laptop. To avoid losing access, they create a <em>scheduled task</em> that re-launches the beacon every time Windows starts.</p>
      <p>As backup, they add their own SSH key to a Linux server they reached, and create a hidden local admin account named <em>svc-backup</em> so it blends in with real service accounts.</p>
      <p>Now even a reboot or one password reset won't kick them out.</p>`
    },
    concept:`<p><strong>Persistence</strong> is how attackers maintain access across interruptions — reboots, credential changes, and time. Without it, one reboot could end the intrusion.</p>
    <p>Common mechanisms: auto-start entries (registry run keys, startup folders), scheduled tasks/cron jobs, new accounts, planted SSH keys, and malicious services. Cloud equivalents: rogue API keys, OAuth app consent, added IAM users.</p>
    <p>Defender focus: persistence creates durable artifacts you can hunt and baseline — unexpected scheduled tasks, new accounts, new SSH keys, odd run-key entries. These are some of the highest-value things to monitor.</p>`,
    techniques:[
      {
        tid:"T1547",name:"Boot or Logon Autostart Execution",
        body:`<p>Planting entries that run code automatically at boot or login — registry Run keys, startup folder, etc.</p>`,
        subs:[{id:"T1547.001",name:"Registry Run Keys / Startup Folder",note:"classic autostart"}],
        apts:["APT28","Kimsuky","Gamaredon"]
      },
      {
        tid:"T1136",name:"Create Account",
        body:`<p>Adding new accounts — local, domain, or cloud — for durable access. Often named to mimic service accounts (svc-, backup-).</p>`,
        subs:[{id:"T1136.001",name:"Local Account",note:"hidden local admin"},{id:"T1136.003",name:"Cloud Account",note:"rogue IAM user"}],
        apts:["APT29","Scattered Spider"]
      },
      {
        tid:"T1505",name:"Server Software Component",
        body:`<p>Installing a web shell or malicious module into a server (web server, Exchange, etc.) so the server itself re-grants access.</p>`,
        subs:[{id:"T1505.003",name:"Web Shell",note:"backdoor on web server"}],
        apts:["APT41","Volt Typhoon","HAFNIUM"]
      },
      {
        tid:"T1053",name:"Scheduled Task/Job",
        body:`<p>Same scheduler abused in Execution, here for durability — the task relaunches the implant after reboot.</p>`,
        subs:[{id:"T1053.005",name:"Scheduled Task",note:"re-launch on boot"}],
        apts:["APT29","Wizard Spider"]
      },
    ],
    flow:"persistence",
    incident:{
      h:"HAFNIUM — ProxyLogon web shells (2021)",
      p:"Exploiting Exchange Server zero-days, HAFNIUM dropped web shells (T1505.003) onto victim mail servers. The web shell let them return at will even after the initial exploit was patched — persistence baked into the server itself."
    },
    say:"Persistence is where defenders get a real advantage, because it leaves durable artifacts. The attacker has to plant something — a scheduled task, a new account, an SSH key, a web shell — to survive reboots. So if I baseline what normal looks like, a new svc-account or an unexpected scheduled task becomes a high-confidence signal that someone's living in my environment.",
    quiz:[
      {q:"An attacker creates a scheduled task that relaunches their malware on every reboot. Primary purpose?",
       opts:["Privilege escalation","Persistence","Exfiltration","Reconnaissance"],a:1,
       ex:"<b>Persistence.</b> Surviving reboots is the goal. (Scheduled Task also appears under Execution — context decides the tactic.)"},
      {q:"A backdoor installed directly into a web server (so it re-grants access) is a:",
       opts:["Web shell","Rootkit","Logic bomb","Keylogger"],a:0,
       ex:"<b>Web Shell (T1505.003).</b> A script on the server that lets the attacker return — central to the HAFNIUM/ProxyLogon attacks."},
      {q:"Why is Persistence a high-value tactic for defenders to monitor?",
       opts:["It is effectively invisible to defenders","It leaves durable artifacts you can baseline and hunt","It only ever happens in cloud environments","It cannot be detected once established"],a:1,
       ex:"Persistence forces the attacker to <b>leave something behind</b>. Baselining normal makes those artifacts stand out."},
    ]
  },

  /* ===================== 6. PRIV ESC ===================== */
  {
    id:"privesc",
    n:"TA0004",
    name:"Privilege Escalation",
    mins:15,
    lede:"Going from a normal user to admin/root/SYSTEM. Most footholds land with low privileges. Attackers need more power to do real damage.",
    story:{
      who:"STORMVALE — Day 7",
      html:`<p>Dan's laptop beacon runs as a regular user — not enough. STORMVALE exploits an unpatched local vulnerability to get <em>SYSTEM</em> on the laptop.</p>
      <p>They also notice a scheduled task that runs as admin but points to a script in a folder regular users can write to. They overwrite that script — next run, their code executes <em>as admin</em>. That's a misconfiguration, not even an exploit.</p>`
    },
    concept:`<p><strong>Privilege Escalation</strong> is gaining higher permissions than you started with — user → admin, admin → domain admin, or in cloud, low-priv role → high-priv role.</p>
    <p>Two broad routes:</p>
    <p><strong>Exploitation</strong> — abusing an OS or software vulnerability to jump privileges (kernel exploits, local privilege-escalation bugs).<br>
    <strong>Abuse of misconfiguration</strong> — far more common in practice: weak file permissions, services running as SYSTEM with writable paths, over-permissioned tokens, sudo misconfig on Linux, or excessive cloud IAM roles.</p>
    <p>This tactic overlaps with Persistence and Defense Evasion — the same access often serves all three.</p>`,
    techniques:[
      {
        tid:"T1068",name:"Exploitation for Privilege Escalation",
        body:`<p>Using a software/kernel vulnerability to elevate. Often paired with a fresh zero-day or unpatched local bug.</p>`,
        subs:[],
        apts:["APT28","Sandworm","Turla"]
      },
      {
        tid:"T1548",name:"Abuse Elevation Control Mechanism",
        body:`<p>Bypassing controls meant to gate elevation — Windows UAC, Linux sudo, setuid binaries.</p>`,
        subs:[{id:"T1548.002",name:"Bypass UAC",note:"Windows"},{id:"T1548.003",name:"Sudo and Sudo Caching",note:"Linux"}],
        apts:["APT29","FIN7"]
      },
      {
        tid:"T1078",name:"Valid Accounts",
        body:`<p>Reused here: if a stolen account already has admin rights, the attacker simply uses it — no exploit needed. Same technique, different tactic context.</p>`,
        subs:[{id:"T1078.002",name:"Domain Accounts",note:"privileged domain creds"}],
        apts:["APT29","Scattered Spider"]
      },
    ],
    flow:"privesc",
    incident:{
      h:"Sandworm — chaining exploits to domain control",
      p:"Russia's Sandworm (behind NotPetya and Ukraine grid attacks) chains exploitation and credential abuse to escalate toward domain dominance, then uses that power for destructive impact. Escalation is the bridge between a foothold and total control."
    },
    say:"Most footholds land with low privileges, so escalation is the bridge to real damage. People assume it always needs a fancy kernel exploit, but in practice the easy wins are misconfigurations — a service running as SYSTEM with a writable path, weak sudo rules, or an over-permissioned cloud IAM role. That's why hardening and least-privilege beat just patching here.",
    quiz:[
      {q:"An attacker overwrites a script that a SYSTEM-level scheduled task runs from a user-writable folder. This is escalation via:",
       opts:["A kernel zero-day exploit","A misconfiguration such as weak file permissions","A targeted phishing email","A credential brute-force attack"],a:1,
       ex:"<b>Misconfiguration.</b> No exploit needed — weak file permissions on a privileged task's path let user-controlled code run as SYSTEM."},
      {q:"Bypassing Windows UAC or abusing Linux sudo falls under which technique?",
       opts:["Exploitation for Privilege Escalation","Abuse Elevation Control Mechanism","Valid Accounts","Web Shell"],a:1,
       ex:"<b>Abuse Elevation Control Mechanism (T1548)</b> covers defeating the controls that gate elevation (UAC, sudo, setuid)."},
      {q:"Why does least-privilege design hurt this tactic more than patching alone?",
       opts:["Patching software is essentially useless","Many escalations abuse excess permissions, not software bugs","Least privilege also blocks every phishing attempt","Least privilege encrypts the system disk"],a:1,
       ex:"A large share of real escalation abuses <b>over-permissioning and misconfig</b>. Least privilege removes those paths even when patches lag."},
    ]
  },

  /* ===================== 7. DEFENSE EVASION ===================== */
  {
    id:"evasion",
    n:"TA0005",
    name:"Defense Evasion",
    mins:15,
    lede:"Staying invisible. The largest tactic in ATT&CK. Everything attackers do to avoid detection and disable your defenses.",
    story:{
      who:"STORMVALE — ongoing",
      html:`<p>STORMVALE doesn't want the SOC to notice. They <em>clear Windows event logs</em> after key actions, rename their tool to <em>svchost.exe</em> to look like a normal Windows process, and disable the endpoint agent's real-time scanning where they have admin.</p>
      <p>Their C2 traffic is wrapped in HTTPS to a domain that looks like a software-update server — so it blends into normal web traffic.</p>`
    },
    concept:`<p><strong>Defense Evasion</strong> is the biggest tactic in ATT&CK — dozens of techniques whose only job is to avoid being seen and to neutralize your tools.</p>
    <p>Recurring themes: <strong>disabling/tampering security tools</strong>, <strong>clearing logs</strong>, <strong>masquerading</strong> (naming malware like real system files), <strong>obfuscation/encryption</strong> of payloads, <strong>signed binary proxy execution</strong> (running malicious code through trusted signed binaries), and <strong>living off the land</strong> (overlaps with Execution).</p>
    <p>Defender focus: assume evasion is happening. Forward logs off-host so they can't be wiped locally, alert on security-tool tampering, and detect masquerading by checking process paths/signatures, not just names.</p>`,
    techniques:[
      {
        tid:"T1070",name:"Indicator Removal",
        body:`<p>Deleting evidence — clearing event logs, wiping command history, removing dropped files.</p>`,
        subs:[{id:"T1070.001",name:"Clear Windows Event Logs",note:""},{id:"T1070.004",name:"File Deletion",note:""}],
        apts:["APT28","Lazarus","Sandworm"]
      },
      {
        tid:"T1036",name:"Masquerading",
        body:`<p>Making malicious things look legitimate — naming a binary svchost.exe, faking file extensions, spoofing publisher names.</p>`,
        subs:[{id:"T1036.005",name:"Match Legitimate Name or Location",note:"fake svchost.exe"}],
        apts:["Lazarus","FIN7","APT29"]
      },
      {
        tid:"T1562",name:"Impair Defenses",
        body:`<p>Turning off or blinding security controls — disabling AV/EDR, stopping logging, modifying firewall rules.</p>`,
        subs:[{id:"T1562.001",name:"Disable or Modify Tools",note:"kill EDR/AV"},{id:"T1562.004",name:"Disable/Modify Firewall",note:""}],
        apts:["Scattered Spider","Wizard Spider","LockBit affiliates"]
      },
      {
        tid:"T1218",name:"System Binary Proxy Execution",
        body:`<p>Running malicious code <em>through</em> trusted signed Windows binaries (rundll32, mshta, regsvr32) so it inherits their trust.</p>`,
        subs:[{id:"T1218.011",name:"Rundll32",note:""},{id:"T1218.005",name:"Mshta",note:""}],
        apts:["APT29","FIN7","Lazarus"]
      },
    ],
    flow:"evasion",
    incident:{
      h:"Ransomware crews — kill the EDR first",
      p:"Modern ransomware affiliates (LockBit, BlackCat operators, Scattered Spider) routinely try to disable or uninstall EDR/antivirus (T1562.001) before encrypting, often using legitimate driver-loading tricks. Knocking out defenses is now a standard pre-encryption step."
    },
    say:"Defense Evasion is the largest tactic in ATT&CK, and the lesson for me is to assume it's always happening. Attackers clear logs, rename malware to look like svchost, and disable EDR before they act. So I forward logs off the host where they can't be wiped, alert hard on any security-tool tampering, and verify processes by path and signature, not just by name.",
    quiz:[
      {q:"An attacker renames their malware to 'svchost.exe' to blend in. This technique is:",
       opts:["Masquerading","Obfuscated Files or Information","Indicator Removal","Process Injection"],a:0,
       ex:"<b>Masquerading (T1036).</b> Detect it by checking the process <b>path and signature</b>, not just the filename — real svchost runs from System32."},
      {q:"Why should logs be forwarded to a central server off the host?",
       opts:["To save disk space on the endpoints","So attackers can't erase the local evidence","To make the network run faster","To keep the logs encrypted at rest"],a:1,
       ex:"<b>Indicator Removal (T1070)</b> includes clearing local logs. Off-host forwarding preserves evidence even if the host is wiped."},
      {q:"Ransomware crews disabling EDR before encrypting is an example of:",
       opts:["Impair Defenses","Persistence","Initial Access","Reconnaissance"],a:0,
       ex:"<b>Impair Defenses (T1562.001).</b> Killing the security tooling first is now a standard pre-ransomware step."},
    ]
  },

  /* ===================== 8. CREDENTIAL ACCESS ===================== */
  {
    id:"credaccess",

    name:"Credential Access",
    mins:15,
    lede:"Stealing passwords, hashes, tokens, and keys. Credentials are the master keys — with them, attackers move freely and look legitimate.",
    story:{
      who:"STORMVALE — Day 8",
      html:`<p>With SYSTEM on Dan's laptop, STORMVALE runs a tool that dumps credentials from memory (<em>LSASS</em>) — grabbing password hashes and a domain admin's cached token.</p>
      <p>They also find a script on a file share with a hardcoded database password. And they set up a fake login prompt to capture any MFA code Dan types. Now they have keys to multiple systems.</p>`
    },
    concept:`<p><strong>Credential Access</strong> is stealing the keys to the kingdom. Once an attacker has valid credentials, much of the rest of the attack looks like normal authorized activity.</p>
    <p>Major methods: <strong>credential dumping</strong> (extracting hashes/tokens from memory like LSASS, or from the SAM/NTDS database), <strong>brute force / password spraying</strong>, <strong>capturing input</strong> (keyloggers, fake prompts), <strong>stealing from files</strong> (passwords in scripts, config, password stores), and <strong>stealing tokens/cookies</strong> to bypass MFA.</p>
    <p>Defender focus: protect LSASS (Credential Guard), detect dumping behavior, alert on spraying patterns, and remember that <strong>token/cookie theft can defeat MFA</strong> — so monitor for impossible-travel and anomalous sessions too.</p>`,
    techniques:[
      {
        tid:"T1003",name:"OS Credential Dumping",
        body:`<p>Extracting credentials from the operating system — LSASS memory, SAM, or the domain NTDS.dit database.</p>`,
        subs:[{id:"T1003.001",name:"LSASS Memory",note:"e.g. Mimikatz-style"},{id:"T1003.003",name:"NTDS",note:"domain hash database"}],
        apts:["APT28","APT29","Wizard Spider","FIN6"]
      },
      {
        tid:"T1110",name:"Brute Force",
        body:`<p>Guessing credentials at scale. Password spraying (one common password vs many users) avoids lockouts.</p>`,
        subs:[{id:"T1110.003",name:"Password Spraying",note:"low-and-slow"},{id:"T1110.004",name:"Credential Stuffing",note:"reused breached creds"}],
        apts:["APT28","APT33","Lazarus"]
      },
      {
        tid:"T1555",name:"Credentials from Password Stores",
        body:`<p>Looting saved credentials — browser password stores, password managers, cloud key vaults, keychains.</p>`,
        subs:[{id:"T1555.003",name:"Credentials from Web Browsers",note:""}],
        apts:["APT37","Scattered Spider"]
      },
      {
        tid:"T1539",name:"Steal Web Session Cookie",
        body:`<p>Stealing an authenticated session cookie/token to ride a logged-in session — bypassing MFA without ever knowing the password.</p>`,
        subs:[],
        apts:["Scattered Spider","LAPSUS$"]
      },
    ],
    flow:"credaccess",
    incident:{
      h:"Scattered Spider — MFA bypass via social engineering + tokens",
      p:"Scattered Spider (behind major 2023 casino/retail breaches) combines help-desk social engineering, SIM-swapping, and session-token theft to defeat MFA, then dumps further credentials to move laterally. It shows MFA is necessary but not sufficient."
    },
    say:"Credentials are the master keys — once an attacker has them, the rest of the intrusion looks like normal authorized activity. The big one is dumping from LSASS memory. And a point that surprises people: stealing a session cookie or token can defeat MFA entirely, no password needed — which is exactly how Scattered Spider operates. So I protect LSASS, and I also watch for impossible-travel and anomalous sessions, not just failed logins.",
    quiz:[
      {q:"An attacker dumps password hashes from LSASS memory. This technique is:",
       opts:["Brute Force","OS Credential Dumping","Phishing","Masquerading"],a:1,
       ex:"<b>OS Credential Dumping (T1003.001).</b> LSASS holds credential material in memory; Credential Guard helps protect it."},
      {q:"Password spraying differs from classic brute force because it:",
       opts:["Tries many passwords against one account","Tries one common password across many accounts to dodge lockouts","Only works against cloud accounts","Requires admin rights before it can start"],a:1,
       ex:"<b>Spraying</b> is low-and-slow: one password vs many users, dodging account-lockout thresholds."},
      {q:"How can an attacker bypass MFA without knowing the password?",
       opts:["By guessing the password more aggressively","By stealing an authenticated session cookie or token","By scanning the network for open ports","By clearing the authentication logs"],a:1,
       ex:"<b>Steal Web Session Cookie (T1539).</b> A valid session token rides the already-authenticated session — defeating MFA. Monitor for anomalous sessions."},
    ]

  /* ===================== 9. DISCOVERY ===================== */

      html:`<p>Inside the network now, STORMVALE runs built-in commands to list domain accounts, find the domain controllers, see which machines are reachable, and check what security tools are installed.</p>

  /* ===================== 10. LATERAL MOVEMENT ===================== */
  {
    id:"lateral",
    n:"TA0008",
    name:"Lateral Movement",
    mins:15,
    lede:"Spreading from machine to machine. The first box is rarely the target. Attackers pivot through the network toward the data they actually want.",
    story:{
      who:"STORMVALE — Day 10",
      html:`<p>STORMVALE has the finance DB server in their sights, but it's not directly reachable from Dan's laptop. Using the stolen domain admin token, they use <em>Remote Desktop</em> and remote service execution to hop to a jump server, then to <em>NW-DB-FIN01</em>.</p>
      <p>Because they're using valid credentials and standard admin tools, each hop looks like legitimate IT activity.</p>`
    },
    concept:`<p><strong>Lateral Movement</strong> is moving through the network from the initial foothold toward the goal. The breached laptop is just a launch point.</p>
    <p>Common methods: <strong>Remote Services</strong> (RDP, SSH, SMB, WinRM), <strong>Pass-the-Hash / Pass-the-Ticket</strong> (using stolen hashes/Kerberos tickets without the plaintext password), <strong>remote service creation</strong> (PsExec-style), and abusing management tools.</p>
    <p>Critical insight: lateral movement usually rides on <strong>stolen valid credentials + legitimate admin protocols</strong>, so it blends in. Defenses: network segmentation (limit where one host can reach), MFA on internal admin access, and detecting unusual auth patterns (a workstation suddenly RDP-ing to servers).</p>`,
    techniques:[
      {
        tid:"T1021",name:"Remote Services",
        body:`<p>Using legitimate remote-access protocols to move — RDP, SMB/admin shares, SSH, WinRM.</p>`,
        subs:[{id:"T1021.001",name:"Remote Desktop Protocol",note:"RDP"},{id:"T1021.002",name:"SMB / Admin Shares",note:""},{id:"T1021.004",name:"SSH",note:""}],
        apts:["APT29","FIN7","Wizard Spider"]
      },
      {
        tid:"T1550",name:"Use Alternate Authentication Material",
        body:`<p>Authenticating with stolen hashes or tickets instead of passwords — Pass-the-Hash, Pass-the-Ticket.</p>`,
        subs:[{id:"T1550.002",name:"Pass the Hash",note:""},{id:"T1550.003",name:"Pass the Ticket",note:"Kerberos"}],
        apts:["APT28","APT29","Lazarus"]
      },
      {
        tid:"T1570",name:"Lateral Tool Transfer",
        body:`<p>Copying tools/malware between internal hosts (over SMB shares, etc.) to operate on each new machine.</p>`,
        subs:[],
        apts:["Sandworm","Wizard Spider"]
      },
    ],
    flow:"lateral",
    incident:{
      h:"NotPetya (2017) — Sandworm's wormable spread",
      p:"NotPetya combined credential theft (Mimikatz-style) with Pass-the-Hash and remote execution (PsExec/WMI) to spread laterally across entire networks in minutes, causing billions in damage. It's the canonical example of credential-driven lateral movement at scale."
    },
    say:"Lateral movement is the attacker pivoting from the first box toward the real target, and it almost always rides on stolen valid credentials plus legitimate protocols like RDP and SMB — so it looks like normal IT work. NotPetya is the example, spreading via Pass-the-Hash in minutes. My best defenses are network segmentation to limit reach, MFA on internal admin access, and alerting when a workstation suddenly starts RDP-ing to servers.",
    quiz:[
      {q:"Authenticating to a new host using a stolen NTLM hash (no plaintext password) is:",
       opts:["Brute Force","Pass the Hash","Phishing","Masquerading"],a:1,

      {q:"Why does lateral movement often evade detection?",
       opts:["It relies on a fresh zero-day for every hop","It rides stolen valid creds and normal admin protocols","It only operates while the hosts are offline","It disables the network while moving across it"],a:1,
       ex:"Legitimate creds + RDP/SMB/WinRM blend into normal admin activity. Detection needs <b>auth-pattern anomalies</b> and segmentation."},
      {q:"Which control most directly limits how far an attacker can move laterally?",
       opts:["Antivirus signatures","Network segmentation","Longer passwords","Disk encryption"],a:1,
       ex:"<b>Segmentation</b> restricts which hosts can talk to which, shrinking the reachable blast radius even after a foothold."},
    ]
  },

  /* ===================== 11. COLLECTION ===================== */

  /* ===================== 12. C2 ===================== */
  {
    id:"c2",
    n:"TA0011",
    name:"Command and Control",
    mins:15,
    lede:"The attacker's remote control channel. C2 is how the implant takes orders and sends data back — disguised to blend into normal traffic.",
    story:{
      who:"STORMVALE — throughout",
      html:`<p>The whole time, Dan's implant has been beaconing to STORMVALE's C2 server over <em>HTTPS</em>, disguised as traffic to a software-update domain. Commands come down; results go up.</p>
      <p>To stay resilient, the implant beacons on a jittered schedule (not a fixed interval) and can fall back to a second channel using <em>DNS queries</em> if HTTPS is blocked.</p>`
    },
    concept:`<p><strong>Command and Control (C2)</strong> is the communication channel between the attacker and their malware inside your network. Without it, the implant is deaf and mute.</p>
    <p>Design goals for attackers: <strong>blend in</strong> (use common ports/protocols like HTTPS, DNS, or even legit web services), <strong>stay resilient</strong> (multiple channels, domain fronting, fallback), and <strong>stay quiet</strong> (jittered beaconing, encryption).</p>
    <p>Techniques: standard application-layer protocols, <strong>DNS tunneling</strong>, <strong>encrypted channels</strong>, <strong>web service / legitimate cloud as C2</strong>, and <strong>proxying</strong>.</p>
    <p>Defender focus: hunt for <strong>beaconing patterns</strong> (regular call-outs), rare/newly-seen destinations, DNS anomalies, and TLS to suspicious domains. Egress filtering and DNS monitoring are key.</p>`,
    techniques:[
      {
        tid:"T1071",name:"Application Layer Protocol",
        body:`<p>Hiding C2 in everyday protocols — HTTP/S, DNS, email — so it blends with normal traffic.</p>`,
        subs:[{id:"T1071.001",name:"Web Protocols",note:"HTTP/S C2"},{id:"T1071.004",name:"DNS",note:"DNS tunneling"}],
        apts:["APT28","APT29","Lazarus","FIN7"]
      },
      {
        tid:"T1573",name:"Encrypted Channel",
        body:`<p>Encrypting C2 traffic so inspection can't read commands or stolen data.</p>`,
        subs:[{id:"T1573.002",name:"Asymmetric Cryptography",note:"TLS-based C2"}],
        apts:["APT29","Turla"]
      },
      {
        tid:"T1102",name:"Web Service",
        body:`<p>Using legitimate platforms (cloud storage, social media, code repos) as the C2 relay so traffic looks normal.</p>`,
        subs:[{id:"T1102.002",name:"Bidirectional Communication",note:"two-way via legit service"}],
        apts:["APT29","Turla","APT37"]
      },
      {
        tid:"T1090",name:"Proxy",
        body:`<p>Routing C2 through intermediaries (compromised hosts, anonymizers) to hide the real server and evade blocks.</p>`,
        subs:[{id:"T1090.003",name:"Multi-hop Proxy",note:"chained relays"}],
        apts:["Sandworm","Volt Typhoon"]
      },
    ],
    flow:"c2",
    incident:{
      h:"Volt Typhoon — blend into normal traffic, live off the land",
      p:"China-linked Volt Typhoon, targeting critical infrastructure, emphasizes stealthy C2 through compromised routers/edge devices and living-off-the-land techniques to avoid stand-out malware traffic — designed for long-term, low-noise access."
    },
    say:"C2 is the remote-control channel for the implant, and the attacker's whole goal is to blend in — HTTPS to a normal-looking domain, DNS tunneling as a fallback, jittered beacons so it isn't a clean fixed interval. Volt Typhoon is a stealth-C2 example. So my detection isn't about the payload, it's about the network behavior: beaconing patterns, rare destinations, and DNS anomalies, backed by egress filtering.",
    quiz:[
      {q:"C2 traffic hidden inside HTTPS to a normal-looking domain is an example of:",
       opts:["Application Layer Protocol (web protocols)","Encrypted Channel over TLS","Protocol Tunneling through DNS","Web Service used as a C2 relay"],a:0,
       ex:"<b>Application Layer Protocol / Web Protocols (T1071.001).</b> Using common protocols so C2 blends with legit web traffic."},
      {q:"What network pattern most helps detect C2?",
       opts:["Sustained high CPU usage on the host","Regular 'beaconing' call-outs to rare or new destinations","An unusually large monitor resolution","Frequent unexpected host reboots"],a:1,
       ex:"<b>Beaconing</b> — periodic outbound check-ins — plus rare destinations and DNS anomalies are core C2 hunting signals."},
      {q:"Why do attackers add 'jitter' to beacon timing?",
       opts:["To conserve outbound network bandwidth","To avoid a clean fixed interval that's easy to detect","To add encryption to the channel","To make exfiltration finish faster"],a:1,
       ex:"Randomized (jittered) intervals make the beacon harder to spot than a perfectly regular call-out."},

/* SVG flowcharts keyed by tactic.flow id.
   All use CSS vars so they match the theme. Simple, legible, attack-flow style. */

function box(x,y,w,h,label,sub,color){
  color = color || "var(--cyan)";
  let s = `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8" fill="var(--panel-2)" stroke="${color}" stroke-width="1.5"/>`;
  s += `<text x="${x+w/2}" y="${y+(sub?h/2-4:h/2+5)}" text-anchor="middle" fill="var(--ink)" font-size="13" font-weight="600" font-family="IBM Plex Sans,sans-serif">${label}</text>`;
  if(sub) s += `<text x="${x+w/2}" y="${y+h/2+14}" text-anchor="middle" fill="var(--ink-dim)" font-size="10.5" font-family="IBM Plex Mono,monospace">${sub}</text>`;
  return s;
}
function arrow(x1,y1,x2,y2,label,color){
  color = color || "var(--ink-faint)";
  let s = `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="1.6" marker-end="url(#ah)"/>`;
  if(label){
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    s += `<rect x="${mx-label.length*3.4-6}" y="${my-9}" width="${label.length*6.8+12}" height="18" rx="4" fill="var(--bg)"/>`;
    s += `<text x="${mx}" y="${my+4}" text-anchor="middle" fill="${color}" font-size="10.5" font-family="IBM Plex Mono,monospace">${label}</text>`;
  }
  return s;
}
function defs(){
  return `<defs><marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L7,3 L0,6 Z" fill="var(--ink-faint)"/></marker>
    <marker id="ahr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L7,3 L0,6 Z" fill="var(--red)"/></marker></defs>`;
}
function svgWrap(vb,inner){return `<svg viewBox="0 0 ${vb}" xmlns="http://www.w3.org/2000/svg">${defs()}${inner}</svg>`;}
